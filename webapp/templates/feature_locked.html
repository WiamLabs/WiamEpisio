{% extends "base.html" %}
{% block title %}{{ feature_name }} — Locked{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;">
    <div>
        <div style="font-size:3rem;margin-bottom:1rem;">{{ feature_icon }}</div>
        <h2 style="font-family:'Playfair Display',Georgia,serif;color:#fff;margin-bottom:0.5rem;">{{ feature_name }}</h2>
        <p style="color:var(--gold);font-size:1.1rem;font-weight:600;margin-bottom:1rem;">🔒 Currently Locked</p>
        <p style="color:var(--text-muted);font-size:0.9rem;max-width:400px;margin:0 auto 1.5rem;line-height:1.6;">
            {{ feature_description }}
        </p>
        <a href="{{ url_for('home.home') }}" style="display:inline-block;padding:10px 28px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#000;border-radius:10px;font-weight:600;text-decoration:none;font-size:0.9rem;">
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
