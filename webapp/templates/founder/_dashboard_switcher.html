{% if is_superuser and all_dashboards %}
<div class="dash-card" style="margin-bottom:1.5rem;padding:12px 16px;">
    <div style="font-size:0.78rem;font-weight:600;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">
        <i class="bi bi-grid-3x3-gap"></i> Switch Dashboard View
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
        <a href="{{ url_for('team.dashboard') }}" class="btn-dash btn-dash-sm {% if not current_view %}btn-dash-primary{% endif %}" style="font-size:0.72rem;">
            <i class="bi bi-star-fill"></i> Overview
        </a>
        {% for db_role in all_dashboards %}
        <a href="{{ url_for('team.dashboard', view=db_role) }}" class="btn-dash btn-dash-sm {% if current_view == db_role %}btn-dash-primary{% endif %}" style="font-size:0.72rem;">
            {{ db_role|replace('_', ' ')|title }}
        </a>
        {% endfor %}
    </div>
</div>
{% endif %}
