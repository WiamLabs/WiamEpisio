<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Application Submitted — WiamApp</title>
<link rel="icon" href="{{ url_for('static', filename='img/WiamLogo.png') }}">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:#08081a;color:#e0e0e0;min-height:100vh;
    display:flex;align-items:center;justify-content:center;
}
.done-bg{
    position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;
    background:radial-gradient(ellipse at 50% 30%,rgba(212,168,67,0.1) 0%,transparent 60%),#08081a;
}
.done-card{
    position:relative;z-index:1;text-align:center;
    max-width:480px;margin:40px 20px;padding:48px 36px;
    background:rgba(20,20,40,0.9);border:1px solid rgba(255,255,255,0.06);
    border-radius:20px;backdrop-filter:blur(20px);
    box-shadow:0 12px 48px rgba(0,0,0,0.5);
}
.done-card img{width:100px;height:100px;object-fit:contain;margin-bottom:20px;filter:drop-shadow(0 4px 16px rgba(212,168,67,0.3));}
.check-icon{
    width:72px;height:72px;margin:0 auto 20px;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 24px rgba(34,197,94,0.3);
}
.check-icon svg{width:36px;height:36px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
h1{font-size:1.5rem;color:#d4a843;margin-bottom:12px;}
p{color:#999;font-size:0.95rem;line-height:1.6;margin-bottom:8px;}
.email-highlight{color:#d4a843;font-weight:600;}
.footer{margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.05);}
.footer a{color:#d4a843;text-decoration:none;font-size:0.85rem;}
.footer small{display:block;color:#555;font-size:0.75rem;margin-top:8px;}
</style>
</head>
<body>
<div class="done-bg"></div>
<div class="done-card">
    <img src="{{ url_for('static', filename='img/WiamLogo.png') }}" alt="WiamApp">
    <div class="check-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <h1>Application Submitted!</h1>
    <p>Thank you for your interest in joining <strong style="color:#d4a843;">WiamApp</strong>.</p>
    <p>Your application for <span class="email-highlight">{{ form.title }}</span> has been received successfully.</p>
    <p>We will review your application and get back to you at <span class="email-highlight">{{ resp.applicant_email }}</span>.</p>
    <div class="footer">
        <a href="https://wiamapp.com">Visit WiamApp</a>
        <small>&copy; WiamApp</small>
    </div>
</div>
</body>
</html>
