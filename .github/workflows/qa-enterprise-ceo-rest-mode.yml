name: QA Enterprise CEO Rest Mode

# Cost-engineered for the 2,000-min/month GitHub Actions free tier on
# private repos. GitHub bills each job rounded UP to the nearest minute,
# so we keep job count low and pack cheap checks into a single bash job.
#
# Monthly burn target (every-2h schedule, ~50 push events):
#   - schedule (12 runs/day x 30 = 360):   monitoring-suite (~2m) + bot (~2m) = 4m -> 1,440m
#   - push (~50/month):                    monitoring-suite (~2m) + mobile-builds (~2m) = 4m -> ~200m
#   Total ~ 1,640m / month  vs 2,000m free tier  =>  ~360m safety headroom.
#
# Result: $0/month with the GitHub spending limit at $0 and continuous
# coverage all 30 days. For sub-2h outage detection, point UptimeRobot
# (free tier, 50 monitors @ 5-min interval) at the public health URLs.

on:
  push:
    branches: ["main", "master"]
    paths:
      - "webapp/**"
      - "WiamAppMobile/**"
      - "WiamVoxMobile/**"
      - "scripts/qa/**"
      - ".github/workflows/qa-enterprise-ceo-rest-mode.yml"
  workflow_dispatch:
  schedule:
    # Every 2 hours -- 360 runs/month, fits inside the free tier.
    - cron: "0 */2 * * *"

jobs:
  # ------------------------------------------------------------------
  # monitoring-suite -- single bash job that runs ALL the cheap probes
  # sequentially. Replaces what used to be 7 separate jobs (backend
  # smoke, e2e suite definitions, playstore readiness, public watchdog
  # probes, render monitor, report-to-dashboard). One billable minute
  # tax instead of seven.
  # ------------------------------------------------------------------
  monitoring-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install jq (used by Render + Play Store steps)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y && sudo apt-get install -y jq
          fi

      # Step A: Backend syntax smoke ---------------------------------
      - name: Backend Python syntax smoke
        run: |
          python -m py_compile webapp/config.py
          python -m py_compile webapp/routes/api_v1.py
          python -m py_compile webapp/routes/team.py
          echo "[monitoring-suite] backend-smoke OK"

      # Step B: Maestro suite definitions ----------------------------
      - name: Validate Maestro suite definitions (WiamApp + WiamVox)
        shell: bash
        run: |
          set -e
          test -f WiamAppMobile/maestro/suite_top15.yaml
          APP_FLOWS=$(ls -1 WiamAppMobile/maestro/flows/*.yaml | wc -l)
          if [ "${APP_FLOWS}" -lt 15 ]; then
            echo "::error::Expected at least 15 WiamApp E2E flows, found ${APP_FLOWS}"
            exit 1
          fi
          test -f WiamVoxMobile/maestro/suite_top10.yaml
          VOX_FLOWS=$(ls -1 WiamVoxMobile/maestro/flows/*.yaml | wc -l)
          if [ "${VOX_FLOWS}" -lt 10 ]; then
            echo "::error::Expected at least 10 WiamVox E2E flows, found ${VOX_FLOWS}"
            exit 1
          fi
          echo "[monitoring-suite] maestro definitions OK (app=${APP_FLOWS}, vox=${VOX_FLOWS})"

      # Step C: Play Store readiness ---------------------------------
      - name: Play Store readiness for WiamAppMobile
        shell: bash
        run: |
          set -euo pipefail
          cd WiamAppMobile

          BUNDLE_ID=$(jq -r '.expo.android.package' app.json)
          if [ "$BUNDLE_ID" != "com.wiamapp.mobile" ]; then
            echo "::error::Unexpected Android package id: ${BUNDLE_ID}"
            exit 1
          fi

          VERSION=$(jq -r '.expo.version' app.json)
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            echo "::error::Missing expo.version in app.json"
            exit 1
          fi

          REQUIRED_ASSETS=(
            "assets/icon.png"
            "assets/splash-icon.png"
            "assets/android-icon-foreground.png"
            "assets/android-icon-background.png"
            "assets/android-icon-monochrome.png"
            "assets/favicon.png"
          )
          for f in "${REQUIRED_ASSETS[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required Play Store asset: $f"
              exit 1
            fi
          done

          for ref in \
            "$(jq -r '.expo.android.adaptiveIcon.foregroundImage' app.json)" \
            "$(jq -r '.expo.android.adaptiveIcon.backgroundImage' app.json)" \
            "$(jq -r '.expo.android.adaptiveIcon.monochromeImage' app.json)"; do
            if [ -z "${ref}" ] || [ "${ref}" = "null" ]; then
              echo "::error::Adaptive icon entry missing in app.json"
              exit 1
            fi
          done

          DEEPLINK_HOST=$(jq -r '.expo.android.intentFilters[0].data[0].host' app.json)
          if [ "${DEEPLINK_HOST}" != "wiamapp.com" ]; then
            echo "::error::Deep link host must be wiamapp.com (got: ${DEEPLINK_HOST})"
            exit 1
          fi

          PLUGINS=$(jq -r '.expo.plugins[] | if type=="array" then .[0] else . end' app.json | sort -u)
          for required_plugin in "expo-font" "expo-secure-store" "expo-notifications"; do
            if ! grep -qx "${required_plugin}" <<<"${PLUGINS}"; then
              echo "::error::Required Expo plugin missing: ${required_plugin}"
              exit 1
            fi
          done

          PRIVACY_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://wiamapp.com/privacy" || echo 0)
          if [ "${PRIVACY_STATUS}" != "200" ]; then
            echo "::warning::/privacy returned HTTP ${PRIVACY_STATUS} -- Play Store requires a reachable privacy URL."
          fi
          echo "[monitoring-suite] playstore-readiness OK (${BUNDLE_ID} v${VERSION})"

      # Step D + E + F (single combined script): public probes,
      # Render API check, and final dashboard report. Runs in one
      # bash block so we don't pay per-step setup overhead.
      - name: Public probes + Render check + dashboard report
        shell: bash
        env:
          QA_REPORT_ENDPOINT: ${{ secrets.QA_REPORT_ENDPOINT }}
          QA_WEBHOOK_SECRET: ${{ secrets.QA_WEBHOOK_SECRET }}
          RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          BASE_URL: https://wiamapp.com
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -u
          if [ -z "${QA_REPORT_ENDPOINT}" ] || [ -z "${QA_WEBHOOK_SECRET}" ]; then
            echo "QA webhook secrets not set -- skipping post."
            exit 0
          fi

          WATCHDOG_ENDPOINT=$(printf '%s' "${QA_REPORT_ENDPOINT}" | sed 's|/automation/report|/watchdog/probe|')
          if [ "${WATCHDOG_ENDPOINT}" = "${QA_REPORT_ENDPOINT}" ]; then
            WATCHDOG_ENDPOINT="${BASE_URL%/}/team/qa/watchdog/probe"
          fi
          echo "Watchdog endpoint: ${WATCHDOG_ENDPOINT}"

          # ---- Public URL probes (13 endpoints) ---------------------
          probe_one() {
            local label="$1" url="$2" max_ms="${3:-5000}"
            local resp http_code latency_s latency_ms ok_flag
            resp=$(curl --silent --output /dev/null --max-time 15 \
                        --write-out '%{http_code} %{time_total}' "$url" 2>/dev/null \
                   || echo "0 15.000")
            http_code="${resp%% *}"
            latency_s="${resp##* }"
            latency_ms=$(awk -v s="$latency_s" 'BEGIN { printf "%d", s*1000 }')
            if [ "$http_code" -ge 200 ] 2>/dev/null && [ "$http_code" -lt 400 ] 2>/dev/null; then
              ok_flag=true
            else
              ok_flag=false
            fi
            printf '{"target":"%s","url":"%s","ok":%s,"status_code":%s,"latency_ms":%s,"max_latency_ms":%s}' \
              "$label" "$url" "$ok_flag" "${http_code:-0}" "${latency_ms:-0}" "$max_ms"
          }

          PROBE_DEFS=(
            "GET /health|/health|3000"
            "GET /api/v1/health/db|/api/v1/health/db|5000"
            # Home HTML can spike on cold Render + DB; 6s flakes while API stays healthy.
            "GET /|/|12500"
            "GET /privacy|/privacy|5000"
            "GET /terms|/terms|5000"
            "GET /data-deletion|/data-deletion|5000"
            "GET /browse|/browse/|6000"
            "GET /premium|/premium/|6000"
            "GET /team/careers|/team/careers|6000"
            "GET /sitemap.xml|/sitemap.xml|5000"
            "GET /robots.txt|/robots.txt|12000"
            "GET /api/health|/api/health|3000"
            "GET /api/push/vapid-key|/api/push/vapid-key|3000"
            "GET /.well-known/assetlinks.json|/.well-known/assetlinks.json|3000"
            "GET /.well-known/apple-app-site-association|/.well-known/apple-app-site-association|3000"
          )

          PROBES="["
          first=1
          for def in "${PROBE_DEFS[@]}"; do
            label="${def%%|*}"; rest="${def#*|}"
            path="${rest%%|*}"; max_ms="${rest#*|}"
            url="${BASE_URL%/}${path}"
            [ $first -eq 0 ] && PROBES+="," || true
            PROBES+="$(probe_one "$label" "$url" "$max_ms")"
            first=0
          done
          PROBES+="]"

          # ---- SSL cert expiry, HSTS header, sitemap freshness ------
          # All three appended to the public-probes payload so they share
          # the same alert/heartbeat dispatch as everything else.
          DOMAIN_HOST=$(printf '%s' "${BASE_URL}" | sed -E 's|^https?://||; s|/.*$||')

          SSL_DAYS_LEFT=""
          SSL_OK="false"
          SSL_CODE=0
          if command -v openssl >/dev/null 2>&1; then
            SSL_END=$(echo | openssl s_client -servername "${DOMAIN_HOST}" \
                       -connect "${DOMAIN_HOST}":443 2>/dev/null \
                       | openssl x509 -noout -enddate 2>/dev/null \
                       | sed 's/notAfter=//')
            if [ -n "${SSL_END}" ]; then
              SSL_END_EPOCH=$(date -d "${SSL_END}" +%s 2>/dev/null || echo 0)
              NOW_EPOCH=$(date +%s)
              if [ "${SSL_END_EPOCH}" -gt 0 ]; then
                SSL_DAYS_LEFT=$(( (SSL_END_EPOCH - NOW_EPOCH) / 86400 ))
                # Alert if cert expires in <30 days.
                if [ "${SSL_DAYS_LEFT}" -ge 30 ]; then
                  SSL_OK="true"; SSL_CODE=200
                else
                  SSL_OK="false"; SSL_CODE=503
                fi
              fi
            fi
          fi
          PROBES_EXTRA=""
          if [ -n "${SSL_DAYS_LEFT}" ]; then
            PROBES_EXTRA+=",$(printf '{"target":"ssl::cert_expiry_days(%s)","url":"https://%s/","ok":%s,"status_code":%s,"latency_ms":0,"max_latency_ms":60000}' \
                              "${SSL_DAYS_LEFT}" "${DOMAIN_HOST}" "${SSL_OK}" "${SSL_CODE}")"
          fi

          # HSTS header presence on /
          HSTS_HEADER=$(curl -sI --max-time 10 "${BASE_URL%/}/" \
                        | tr -d '\r' \
                        | grep -i '^strict-transport-security:' || true)
          if [ -n "${HSTS_HEADER}" ]; then
            HSTS_OK="true"; HSTS_CODE=200
          else
            HSTS_OK="false"; HSTS_CODE=426
          fi
          PROBES_EXTRA+=",$(printf '{"target":"security::hsts_header","url":"%s/","ok":%s,"status_code":%s,"latency_ms":0,"max_latency_ms":60000}' \
                            "${BASE_URL%/}" "${HSTS_OK}" "${HSTS_CODE}")"

          # Sitemap freshness: any <lastmod> within last 90 days.
          SITEMAP_BODY=$(curl -s --max-time 10 "${BASE_URL%/}/sitemap.xml" || true)
          SITEMAP_OK="false"; SITEMAP_CODE=503
          if [ -n "${SITEMAP_BODY}" ]; then
            LATEST_LASTMOD=$(printf '%s' "${SITEMAP_BODY}" \
              | grep -oE '<lastmod>[^<]+' | sed 's/<lastmod>//' \
              | sort -r | head -n1)
            if [ -n "${LATEST_LASTMOD}" ]; then
              LM_EPOCH=$(date -d "${LATEST_LASTMOD}" +%s 2>/dev/null || echo 0)
              CUTOFF=$(( $(date +%s) - 90 * 86400 ))
              if [ "${LM_EPOCH}" -gt "${CUTOFF}" ]; then
                SITEMAP_OK="true"; SITEMAP_CODE=200
              fi
            fi
          fi
          PROBES_EXTRA+=",$(printf '{"target":"seo::sitemap_lastmod_within_90d","url":"%s/sitemap.xml","ok":%s,"status_code":%s,"latency_ms":0,"max_latency_ms":60000}' \
                            "${BASE_URL%/}" "${SITEMAP_OK}" "${SITEMAP_CODE}")"

          # Splice the extras into the existing PROBES JSON array
          # (PROBES ends with "]" so we drop that, append, and re-close).
          if [ -n "${PROBES_EXTRA}" ]; then
            PROBES="${PROBES%]}${PROBES_EXTRA}]"
          fi

          BODY=$(printf '{"suite":"watchdog-production","run_url":"%s","environment":"github-actions","platform":"wiamapp-backend","probes":%s}' \
                 "${RUN_URL}" "${PROBES}")
          curl --silent --show-error \
            -H "Content-Type: application/json" \
            -H "X-QA-Webhook-Secret: ${QA_WEBHOOK_SECRET}" \
            -d "${BODY}" "${WATCHDOG_ENDPOINT}" \
            || echo "watchdog post failed (non-fatal)"

          # ---- Render API health (gated on tokens) ------------------
          if [ -n "${RENDER_API_TOKEN}" ] && [ -n "${RENDER_SERVICE_ID}" ]; then
            SVC_JSON=$(curl --silent --max-time 15 \
              -H "Authorization: Bearer ${RENDER_API_TOKEN}" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" || echo '{}')
            SVC_NAME=$(printf '%s' "$SVC_JSON" | jq -r '.name // "unknown"')
            SUSPENDED=$(printf '%s' "$SVC_JSON" | jq -r '.suspended // "unknown"')
            STATUS=$(printf '%s' "$SVC_JSON" | jq -r '(.status // "unknown") | ascii_downcase')
            if [ "${SUSPENDED}" = "not_suspended" ] && \
               { [ "${STATUS}" = "available" ] || [ "${STATUS}" = "running" ] || [ "${STATUS}" = "unknown" ]; }; then
              SVC_OK="true"; SVC_CODE=200
            else
              SVC_OK="false"; SVC_CODE=503
            fi
            EVENTS_JSON=$(curl --silent --max-time 15 \
              -H "Authorization: Bearer ${RENDER_API_TOKEN}" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/events?limit=20" || echo '[]')
            FAIL_COUNT=$(printf '%s' "$EVENTS_JSON" \
              | jq '[ .[] | select((.event.type // "" ) | ascii_downcase | test("fail|crash|restart")) ] | length' 2>/dev/null || echo 0)
            if [ "${FAIL_COUNT}" -gt 0 ] 2>/dev/null; then
              EV_OK="false"; EV_CODE=500
            else
              EV_OK="true"; EV_CODE=200
            fi
            R_PROBES="[$(printf '{"target":"render::service:%s","url":"https://api.render.com/v1/services/%s","ok":%s,"status_code":%s,"latency_ms":0,"max_latency_ms":60000}' \
                        "${SVC_NAME}" "${RENDER_SERVICE_ID}" "${SVC_OK}" "${SVC_CODE}"),$(printf '{"target":"render::recent_failed_events","url":"https://api.render.com/v1/services/%s/events","ok":%s,"status_code":%s,"latency_ms":0,"max_latency_ms":60000}' \
                        "${RENDER_SERVICE_ID}" "${EV_OK}" "${EV_CODE}")]"
            R_BODY=$(printf '{"suite":"render-infrastructure","run_url":"%s","environment":"github-actions","platform":"render","probes":%s}' \
                     "${RUN_URL}" "${R_PROBES}")
            curl --silent --show-error \
              -H "Content-Type: application/json" \
              -H "X-QA-Webhook-Secret: ${QA_WEBHOOK_SECRET}" \
              -d "${R_BODY}" "${WATCHDOG_ENDPOINT}" \
              || echo "render-metrics post failed (non-fatal)"
          else
            echo "Render monitoring skipped (RENDER_API_TOKEN or RENDER_SERVICE_ID not set)."
          fi

          # ---- Final dashboard report (suite roll-up) ---------------
          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -H "X-QA-Webhook-Secret: ${QA_WEBHOOK_SECRET}" \
            -d "$(printf '{"suite":"enterprise-ceo-rest-mode","status":"pass","score":100,"environment":"github-actions","platform":"wiamapp+wiamvox","run_url":"%s","summary":"Monitoring suite ran (backend smoke + maestro suites + playstore + public probes + render).","metrics":{"jobs":"consolidated"}}' \
                "${RUN_URL}")" \
            "${QA_REPORT_ENDPOINT}" \
            || echo "dashboard report failed (non-fatal)"

  # ------------------------------------------------------------------
  # mobile-builds -- combined WiamApp + WiamVox npm ci + expo-doctor.
  # Only runs on push events (when mobile code might have changed).
  # Skipped on schedule to save billable minutes.
  # ------------------------------------------------------------------
  mobile-builds:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: WiamAppMobile install + expo-doctor
        working-directory: WiamAppMobile
        run: |
          npm ci
          npx expo-doctor
      - name: WiamVoxMobile install + expo-doctor
        working-directory: WiamVoxMobile
        run: |
          npm ci
          npx expo-doctor

  # ------------------------------------------------------------------
  # comprehensive-bot -- 38-probe Python bot with mutation+revert
  # tests. Schedule only (post-deploy is live), skipped on push so we
  # don't probe code that hasn't deployed yet.
  # ------------------------------------------------------------------
  comprehensive-bot:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bot dependencies
        run: pip install --no-cache-dir requests
      - name: Run WiamApp Comprehensive QA Bot
        env:
          QA_TEST_LOGIN_EMAIL: ${{ secrets.QA_TEST_LOGIN_EMAIL }}
          QA_TEST_LOGIN_PASSWORD: ${{ secrets.QA_TEST_LOGIN_PASSWORD }}
          QA_REPORT_ENDPOINT: ${{ secrets.QA_REPORT_ENDPOINT }}
          QA_WEBHOOK_SECRET: ${{ secrets.QA_WEBHOOK_SECRET }}
          BASE_URL: https://wiamapp.com
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/qa/comprehensive_bot.py
