<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Profile (Guest)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42; --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }
  .scrollarea{ height:calc(100% - 44px - 84px); overflow-y:auto; padding:0 20px 20px; }

  .top-row{ display:flex; justify-content:flex-end; padding:10px 0; }
  .settings-btn{ color:var(--text-faint); }

  .guest-row{ display:flex; align-items:center; gap:13px; margin-bottom:18px; }
  .guest-avatar{ width:52px; height:52px; border-radius:50%; background:var(--navy-card); border:1px solid var(--navy-line); display:flex; align-items:center; justify-content:center; }
  .guest-avatar svg{ color:var(--text-faint); width:24px; height:24px; }
  .login-link{ font-size:15px; font-weight:700; color:#fff; display:flex; align-items:center; gap:4px; }
  .login-link svg{ width:14px; height:14px; color:var(--text-faint); }
  .id-row{ display:flex; align-items:center; gap:8px; margin-top:3px; }
  .id-text{ font-size:11.5px; color:var(--text-faint); }
  .following-text{ font-size:11.5px; color:var(--text-faint); }

  .join-banner{ display:flex; align-items:center; gap:12px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border-radius:18px; padding:16px; margin-bottom:14px; position:relative; overflow:hidden; }
  .join-glow{ position:absolute; right:-20px; top:-30px; width:100px; height:100px; border-radius:50%; background:var(--navy); opacity:0.15; }
  .join-title{ font-size:15px; font-weight:800; color:var(--navy); margin:0 0 3px; }
  .join-sub{ font-size:11px; color:#3A2E05; margin:0; }
  .join-btn{ margin-left:auto; padding:8px 18px; border-radius:999px; background:var(--navy); color:var(--gold); font-size:12px; font-weight:700; border:none; flex-shrink:0; }

  .perks-row{ display:flex; justify-content:space-around; padding:14px 0; margin-bottom:16px; border-bottom:1px solid var(--navy-line); }
  .perk{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .perk svg{ color:var(--text-faint); width:20px; height:20px; }
  .perk span{ font-size:10px; color:var(--text-faint); text-align:center; }

  .menu-group{ border-radius:20px; background:var(--navy-card); border:1px solid var(--navy-line); overflow:hidden; margin-bottom:16px; }
  .menu-row{ display:flex; align-items:center; padding:15px 16px; border-bottom:1px solid var(--navy-line); }
  .menu-row:last-child{ border-bottom:none; }
  .menu-title{ font-size:13.5px; font-weight:500; color:#fff; flex:1; }
  .menu-value{ display:flex; align-items:center; gap:5px; font-size:12.5px; color:var(--gold); font-weight:600; }
  .menu-value svg{ width:13px; height:13px; }
  .menu-chevron{ color:var(--text-faint); margin-left:6px; }

  .footer-copy{ text-align:center; font-size:10px; color:#3A3A56; padding:10px 0 6px; }

  .bottomnav{ position:absolute; bottom:0; left:0; right:0; height:84px; background:var(--navy-soft); border-top:1px solid #1C1C38; display:flex; align-items:flex-start; justify-content:space-around; padding-top:12px; }
  .navitem{ display:flex; flex-direction:column; align-items:center; gap:4px; width:60px; }
  .navitem span{ font-size:9.5px; color:var(--text-faint); }
  .navitem.active span{ color:var(--gold); }
  .navitem svg{ width:19px; height:19px; }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
