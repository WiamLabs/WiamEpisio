<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Buy Coins</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#08081A; --navy-card:#12122A; --navy-line:#1E1E42; --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }
  .header{ display:flex; align-items:center; gap:12px; padding:0 20px 14px; }
  .back-btn{ width:36px; height:36px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .header h1{ font-size:17px; font-weight:700; color:#fff; margin:0; }

  .scrollarea{ height:calc(100% - 44px - 58px); overflow-y:auto; padding:0 20px 20px; }

  .balance-card{ border-radius:22px; padding:20px; margin-bottom:20px; text-align:center; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); }
  .balance-label{ font-size:12px; color:#3A2E05; margin:0 0 4px; }
  .balance-value{ font-size:28px; font-weight:800; color:var(--navy); margin:0; }

  .coin-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:22px; }
  .coin-pack{ border-radius:18px; padding:16px; background:var(--navy-card); border:1.5px solid var(--navy-line); text-align:center; position:relative; }
  .coin-pack.popular{ border-color:var(--gold); }
  .popular-badge{ position:absolute; top:-9px; left:50%; transform:translateX(-50%); background:var(--gold); color:var(--navy); font-size:9px; font-weight:700; padding:3px 10px; border-radius:999px; white-space:nowrap; }
  .coin-icon{ width:38px; height:38px; margin:0 auto 8px; }
  .coin-amount{ font-size:18px; font-weight:800; color:#fff; margin:0; }
  .coin-bonus{ font-size:10.5px; color:var(--gold); font-weight:600; margin:2px 0 8px; }
  .coin-price{ font-size:13px; color:#B8B8CC; font-weight:600; }

  .footer-copy{ text-align:center; font-size:10px; color:#3A3A56; padding:8px 0 6px; }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="header">
    <div class="back-btn"><svg viewBox="0 0 24 24" width="17" height="17" color="#fff"><polyline points="15 18 9 12 15 6"/></svg></div>
    <h1>Buy Coins</h1>
  </div>

  <div class="scrollarea">
    <div class="balance-card">
      <p class="balance-label">Current Balance</p>
      <p class="balance-value">45 Coins</p>
    </div>

    <div class="coin-grid">
      <div class="coin-pack">
        <svg class="coin-icon" viewBox="0 0 24 24" fill="#D4A017" stroke="none"><circle cx="12" cy="12" r="10"/></svg>
        <p class="coin-amount">100</p>
        <p class="coin-bonus">&nbsp;</p>
        <p class="coin-price">GHS 9.99</p>
      </div>
      <div class="coin-pack popular">
        <span class="popular-badge">Most Popular</span>
        <svg class="coin-icon" viewBox="0 0 24 24" fill="#D4A017" stroke="none"><circle cx="12" cy="12" r="10"/></svg>
        <p class="coin-amount">550</p>
        <p class="coin-bonus">+50 bonus</p>
        <p class="coin-price">GHS 44.99</p>
      </div>
      <div class="coin-pack">
        <svg class="coin-icon" viewBox="0 0 24 24" fill="#D4A017" stroke="none"><circle cx="12" cy="12" r="10"/></svg>
        <p class="coin-amount">1,200</p>
        <p class="coin-bonus">+150 bonus</p>
        <p class="coin-price">GHS 89.99</p>
      </div>
      <div class="coin-pack">
        <svg class="coin-icon" viewBox="0 0 24 24" fill="#D4A017" stroke="none"><circle cx="12" cy="12" r="10"/></svg>
        <p class="coin-amount">2,500</p>
        <p class="coin-bonus">+400 bonus</p>
        <p class="coin-price">GHS 169.99</p>
      </div>
    </div>

    <p class="footer-copy">© 2026 WiamEpisio · Powered by WiamLabs · Billed via App Store/Google Play</p>
  </div>
</div>

</body>
</html>
