<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — For You (YouTube-style)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#08081A; --gold:#D4A017; --gold-dark:#A07810; --text-dim:#C9C9DE; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:#000; border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; }

  .statusbar{ height:44px; flex-shrink:0; position:relative; z-index:5; }

  .top-bar{ padding:0 18px 10px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .top-title{ font-size:15px; font-weight:700; color:#fff; }
  .search-btn{ width:32px; height:32px; border-radius:50%; background:#12122A; display:flex; align-items:center; justify-content:center; }

  .video-frame{ position:relative; width:100%; aspect-ratio:9/16; max-height:56%; background:linear-gradient(200deg,#2a1a12,#0d0d24,#000); overflow:hidden; flex-shrink:0; }

  .swipe-edge{ position:absolute; top:0; bottom:0; right:0; width:4px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; z-index:3; }
  .swipe-dot{ width:3px; height:14px; border-radius:999px; background:rgba(255,255,255,0.25); }
  .swipe-dot.active{ background:var(--gold); }

  .center-play{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:52px; height:52px; border-radius:50%; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:4; }

  .video-controls{ position:absolute; bottom:0; left:0; right:0; padding:8px 12px 10px; background:linear-gradient(0deg, rgba(0,0,0,0.75), transparent); z-index:4; }
  .scrub-row{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .time-label{ font-size:10px; color:#fff; font-weight:500; min-width:28px; }
  .scrub-track{ flex:1; height:3px; border-radius:999px; background:rgba(255,255,255,0.3); position:relative; }
  .scrub-fill{ position:absolute; left:0; top:0; bottom:0; width:22%; background:var(--gold); border-radius:999px; }
  .scrub-handle{ position:absolute; left:22%; top:50%; transform:translate(-50%,-50%); width:11px; height:11px; border-radius:50%; background:var(--gold); box-shadow:0 0 0 3px rgba(212,160,23,0.25); }
  .controls-row{ display:flex; align-items:center; justify-content:space-between; }
  .badge-row{ display:flex; gap:6px; }
  .info-badge{ font-size:9.5px; font-weight:700; padding:3px 8px; border-radius:5px; }
  .info-badge.exclusive{ background:var(--gold); color:var(--navy); }
  .info-badge.genre{ background:rgba(255,255,255,0.15); color:#fff; }
  .fullscreen-btn{ color:#fff; }

  .info-panel{ flex:1; overflow-y:auto; padding:16px 18px; }
  .series-title{ font-size:15.5px; font-weight:700; color:#fff; margin:0 0 6px; }
  .ep-caption{ font-size:12px; color:#8B8BA3; line-height:1.5; margin:0 0 14px; }
  .ep-caption .more{ color:var(--gold); font-weight:600; }

  .watch-btn{ width:100%; padding:12px; border-radius:12px; background:var(--gold); color:var(--navy); font-size:13px; font-weight:700; border:none; margin-bottom:16px; }

  .action-strip{ display:flex; gap:22px; padding:12px 0; border-top:1px solid #1a1a3a; }
  .action-item{ display:flex; flex-direction:column; align-items:center; gap:4px; }
  .action-item svg{ color:#C9C9DE; width:20px; height:20px; }
  .action-item span{ font-size:10px; color:#8B8BA3; }

  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>

  <div class="top-bar">
    <span class="top-title">For You</span>
    <div class="search-btn"><svg viewBox="0 0 24 24" width="15" height="15" color="#C9C9DE"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
  </div>

  <div class="video-frame">
    <div class="swipe-edge">
      <div class="swipe-dot active"></div>
      <div class="swipe-dot"></div>
      <div class="swipe-dot"></div>
      <div class="swipe-dot"></div>
    </div>

    <div class="center-play"><svg viewBox="0 0 24 24" width="22" height="22" fill="#fff" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg></div>

    <div class="video-controls">
      <div class="scrub-row">
        <span class="time-label">0:18</span>
        <div class="scrub-track"><div class="scrub-fill"></div><div class="scrub-handle"></div></div>
        <span class="time-label">1:20</span>
      </div>
      <div class="controls-row">
        <div class="badge-row">
          <span class="info-badge exclusive">EXCLUSIVE</span>
          <span class="info-badge genre">Hidden Identity</span>
        </div>
        <svg class="fullscreen-btn" viewBox="0 0 24 24" width="16" height="16"><path d="M3 3l6 6M3 3v5M3 3h5"/><path d="M21 3l-6 6M21 3v5M21 3h-5"/><path d="M3 21l6-6M3 21v-5M3 21h5"/><path d="M21 21l-6-6M21 21v-5M21 21h-5"/></svg>
      </div>
    </div>
  </div>

  <div class="info-panel">
    <p class="series-title">My Husband is a Hidden Hero!</p>
    <p class="ep-caption">EP.1 — A legendary war commander living undercover as a mechanic is forced back into a world he tried to leave behind. <span class="more">more</span></p>
    <button class="watch-btn">Watch Full Series</button>

    <div class="action-strip">
      <div class="action-item"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span>492K</span></div>
      <div class="action-item"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg><span>Share</span></div>
    </div>
  </div>
</div>

</body>
</html>
