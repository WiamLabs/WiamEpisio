<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#08081A; --gold:#D4A017; --gold-dark:#A07810; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; align-items:center; justify-content:center; }

  .bg-grid{
    position:absolute; inset:0; opacity:0.4;
    background-image:
      linear-gradient(135deg, rgba(212,160,23,0.06) 0%, transparent 40%),
      linear-gradient(215deg, rgba(212,160,23,0.04) 0%, transparent 50%);
  }
  .film-strip{ position:absolute; top:0; bottom:0; width:14px; background:repeating-linear-gradient(180deg, #000 0px, #000 10px, transparent 10px, transparent 22px); opacity:0.5; }
  .film-strip.left{ left:0; }
  .film-strip.right{ right:0; }

  .glow{ position:absolute; width:360px; height:360px; border-radius:50%; background:radial-gradient(circle, rgba(212,160,23,0.18), transparent 70%); animation:pulse 2.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); opacity:0.6; } 50%{ transform:scale(1.18); opacity:1; } }

  .logo-mark{
    width:100px; height:100px; border-radius:24px; background:linear-gradient(135deg,var(--gold),var(--gold-dark));
    display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:800; font-size:40px;
    position:relative; z-index:1; animation:pop 0.6s cubic-bezier(.34,1.56,.64,1); clip-path: polygon(30% 0%, 100% 0, 100% 100%, 30% 100%, 0% 50%);
  }
  @keyframes pop{ 0%{ transform:scale(0.4); opacity:0; } 100%{ transform:scale(1); opacity:1; } }

  .wordmark{ margin-top:24px; font-size:28px; font-weight:800; color:#fff; letter-spacing:-0.5px; z-index:1; }
  .wordmark span{ color:var(--gold); }
  .tagline{ margin-top:8px; font-size:12.5px; color:#8B8BA3; z-index:1; letter-spacing:1.5px; text-transform:uppercase; }

  .loader{ margin-top:44px; width:150px; height:3px; background:#1E1E42; border-radius:999px; overflow:hidden; z-index:1; }
  .loader-fill{ height:100%; width:35%; background:linear-gradient(90deg,var(--gold),var(--gold-dark)); border-radius:999px; animation:load 1.4s ease-in-out infinite; }
  @keyframes load{ 0%{ transform:translateX(-100%); } 100%{ transform:translateX(400%); } }

  .footer{ position:absolute; bottom:34px; font-size:10px; color:#3A3A56; z-index:1; }
</style>
</head>
<body>
<div class="phone">
  <div class="bg-grid"></div>
  <div class="film-strip left"></div>
  <div class="film-strip right"></div>
  <div class="glow"></div>
  <div class="logo-mark">W</div>
  <div class="wordmark">Wiam<span>Episio</span></div>
  <p class="tagline">African Vertical Drama</p>
  <div class="loader"><div class="loader-fill"></div></div>
  <p class="footer">© 2026 WiamEpisio · Powered by WiamLabs</p>
</div>
</body>
</html>
