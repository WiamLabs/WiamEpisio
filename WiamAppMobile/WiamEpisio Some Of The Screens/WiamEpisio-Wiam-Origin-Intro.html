<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Wiam Origin Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#08081A; --gold:#D4A017; --gold-dark:#A07810; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:#000; border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; }

  .rays{
    position:absolute; inset:0;
    background:
      repeating-conic-gradient(from 0deg, rgba(212,160,23,0.08) 0deg 6deg, transparent 6deg 12deg);
    animation:spin 14s linear infinite;
  }
  @keyframes spin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }

  .vignette{ position:absolute; inset:0; background:radial-gradient(circle at center, transparent 40%, #000 90%); }

  .logo-wrap{ position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; }

  .badge{
    width:150px; height:150px; position:relative; margin-bottom:26px;
    animation:emerge 1.4s cubic-bezier(.16,1,.3,1);
  }
  @keyframes emerge{ 0%{ transform:scale(0.3) rotateY(180deg); opacity:0; filter:blur(10px); } 60%{ opacity:1; filter:blur(0); } 100%{ transform:scale(1) rotateY(0deg); opacity:1; } }

  .badge svg{ width:100%; height:100%; filter:drop-shadow(0 0 30px rgba(212,160,23,0.5)); }

  .wordmark{
    font-size:15px; font-weight:800; letter-spacing:6px; color:var(--gold); text-transform:uppercase;
    animation:fadeUp 1s ease-out 0.8s both;
  }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }

  .subtext{
    font-size:10px; letter-spacing:3px; color:#8B8BA3; margin-top:8px; text-transform:uppercase;
    animation:fadeUp 1s ease-out 1.1s both;
  }

  .sound-note{
    position:absolute; bottom:34px; left:0; right:0; text-align:center; z-index:2;
    font-size:10.5px; color:#5A5A75; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .sound-note svg{ width:13px; height:13px; }
</style>
</head>
<body>

<div class="phone">
  <div class="rays"></div>
  <div class="vignette"></div>

  <div class="logo-wrap">
    <div class="badge">
      <svg viewBox="0 0 220 220">
        <defs>
          <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2a2a5a"/>
            <stop offset="50%" stop-color="#08081A"/>
            <stop offset="100%" stop-color="#000"/>
          </linearGradient>
          <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F5D060"/>
            <stop offset="55%" stop-color="#D4A017"/>
            <stop offset="100%" stop-color="#8a6410"/>
          </linearGradient>
        </defs>
        <circle cx="110" cy="110" r="100" fill="url(#ng)" stroke="#000" stroke-width="2"/>
        <path d="M55 78 L75 78 L92 132 L108 96 L124 132 L141 78 L161 78 L128 165 L108 165 L96 138 L84 165 L64 165 Z"
              fill="url(#gg)"/>
      </svg>
    </div>
    <div class="wordmark">Wiam Origin</div>
    <div class="subtext">An Original Series</div>
  </div>

  <div class="sound-note">
    <svg viewBox="0 0 24 24" stroke="#5A5A75" fill="none" stroke-width="1.8"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    Signature sound plays on load
  </div>
</div>

</body>
</html>
