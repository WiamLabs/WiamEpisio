<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Reminder Set (Empty)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42; --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }
  .topfixed{ padding:12px 20px 10px; display:flex; align-items:center; justify-content:space-between; }
  .tabs{ display:flex; gap:20px; }
  .tab{ font-size:14px; font-weight:600; color:var(--text-faint); padding-bottom:8px; border-bottom:2px solid transparent; }
  .tab.active{ color:#fff; border-color:var(--gold); }
  .edit-icon{ color:var(--text-faint); }

  .empty-wrap{ display:flex; flex-direction:column; align-items:center; justify-content:center; height:calc(100% - 44px - 62px - 84px); padding:0 40px; text-align:center; }
  .empty-icon{ width:84px; height:84px; border-radius:20px; background:var(--navy-card); border:1px solid var(--navy-line); display:flex; align-items:center; justify-content:center; margin-bottom:18px; }
  .empty-icon svg{ color:var(--text-faint); width:36px; height:36px; }
  .empty-text{ font-size:13.5px; color:var(--text-faint); margin:0 0 22px; }
  .watch-btn{ padding:13px 26px; border-radius:999px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); color:var(--navy); font-size:13.5px; font-weight:700; border:none; }

  .bottomnav{ position:absolute; bottom:0; left:0; right:0; height:84px; background:var(--navy-soft); border-top:1px solid #1C1C38; display:flex; align-items:flex-start; justify-content:space-around; padding-top:12px; }
  .navitem{ display:flex; flex-direction:column; align-items:center; gap:4px; width:60px; }
  .navitem span{ font-size:9.5px; color:var(--text-faint); }
  .navitem.active span{ color:var(--gold); }
  .navitem svg{ width:19px; height:19px; }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="topfixed">
    <div class="tabs">
      <span class="tab">Following</span>
      <span class="tab">History</span>
      <span class="tab active">Reminder Set</span>
    </div>
    <svg class="edit-icon" viewBox="0 0 24 24" width="18" height="18"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
  </div>

  <div class="empty-wrap">
    <div class="empty-icon"><svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M8 8V6a4 4 0 0 1 8 0v2"/><circle cx="12" cy="14" r="2"/></svg></div>
    <p class="empty-text">You haven't set any reminders yet</p>
    <button class="watch-btn">Watch popular dramas</button>
  </div>

  <div class="bottomnav">
    <div class="navitem" style="color:#5A5A75"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg><span>Home</span></div>
    <div class="navitem" style="color:#5A5A75"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg><span>For You</span></div>
    <div class="navitem" style="color:#5A5A75"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="3"/></svg><span>Member</span></div>
    <div class="navitem active"><svg viewBox="0 0 24 24" fill="#D4A017" stroke="none"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span style="color:#D4A017">My List</span></div>
    <div class="navitem" style="color:#5A5A75"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></div>
  </div>
</div>

</body>
</html>
