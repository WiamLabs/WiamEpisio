<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Switching to Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .glow-bg{ position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); width:460px; height:460px; background:radial-gradient(circle, rgba(212,160,23,0.2), transparent 65%); }
  .statusbar{ height:44px; position:relative; z-index:2; }

  .wrap{ position:relative; z-index:2; height:calc(100% - 44px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 40px; text-align:center; }

  /* Split identity visual — viewer icon morphing to studio icon */
  .switch-visual{ display:flex; align-items:center; gap:16px; margin-bottom:30px; }
  .id-icon{ width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center; }
  .id-icon.viewer{ background:var(--navy-card); border:1px solid #1E1E42; opacity:0.5; }
  .id-icon.viewer svg{ color:var(--text-dim); width:24px; height:24px; }
  .id-icon.studio{ background:linear-gradient(135deg,var(--gold),var(--gold-dark)); box-shadow:0 14px 34px rgba(212,160,23,0.4); }
  .id-icon.studio svg{ color:var(--navy); width:26px; height:26px; }
  .switch-arrow{ color:var(--gold); }

  h1{ font-size:19px; font-weight:800; color:#fff; margin:0 0 8px; }
  .sub{ font-size:12px; color:var(--text-dim); line-height:1.6; margin:0 0 30px; }
  .sub b{ color:var(--gold); }

  .spinner{ width:26px; height:26px; border-radius:50%; border:3px solid rgba(212,160,23,0.2); border-top-color:var(--gold); margin-bottom:20px; }

  .account-chip{ display:flex; align-items:center; gap:8px; background:var(--navy-card); border-radius:999px; padding:8px 16px; }
  .account-chip .dot{ width:6px; height:6px; border-radius:50%; background:#3BB273; }
  .account-chip span{ font-size:11px; color:var(--text-dim); font-weight:600; }
</style>
</head>
<body>

<div class="phone">
  <div class="glow-bg"></div>
  <div class="statusbar"></div>

  <div class="wrap">
    <div class="switch-visual">
      <div class="id-icon viewer"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
      <svg class="switch-arrow" viewBox="0 0 24 24" width="20" height="20"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      <div class="id-icon studio"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2 3 7l9 5 9-5-9-5z"/><path d="M3 12l9 5 9-5" fill="none" stroke="#08081A" stroke-width="2"/></svg></div>
    </div>

    <h1>Switching to WiamStudio</h1>
    <p class="sub">Same account, creator mode. Your viewer profile stays exactly as you left it — <b>Kwabena Studios</b> is loading.</p>

    <div class="spinner"></div>

    <div class="account-chip"><span class="dot"></span><span>Signed in as Kwabena Mensah</span></div>
  </div>
</div>

</body>
</html>
