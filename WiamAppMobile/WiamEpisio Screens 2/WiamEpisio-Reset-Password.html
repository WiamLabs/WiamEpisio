<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#08081A; --navy-card:#12122A; --navy-line:#1E1E42; --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; --green:#3BB273; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; padding:0 26px; }
  .statusbar{ height:44px; }
  .back-btn{ width:34px; height:34px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; margin-bottom:26px; }

  .hero{ margin-bottom:28px; }
  .icon-badge{ width:52px; height:52px; border-radius:16px; background:rgba(59,178,115,0.14); border:1px solid rgba(59,178,115,0.35); display:flex; align-items:center; justify-content:center; margin-bottom:18px; color:var(--green); }
  h1{ font-size:22px; font-weight:800; color:#fff; margin:0 0 8px; letter-spacing:-0.3px; }
  .sub{ font-size:12.5px; color:var(--text-dim); margin:0; line-height:1.6; }

  .field-group{ margin-bottom:14px; }
  .field-label{ font-size:11.5px; font-weight:600; color:var(--text-dim); margin:0 0 7px; display:block; }
  .field-box{ background:var(--navy-card); border:1px solid var(--navy-line); border-radius:14px; padding:13px 14px; display:flex; align-items:center; gap:10px; }
  .field-box.focus{ border-color:var(--gold); }
  .field-box svg{ color:var(--gold); flex-shrink:0; width:15px; height:15px; }
  .field-box input{ background:none; border:none; outline:none; color:#fff; font-size:13.5px; font-family:inherit; width:100%; }
  .field-box input::placeholder{ color:var(--text-faint); }
  .eye-btn{ color:var(--text-faint); flex-shrink:0; }

  .strength-row{ display:flex; gap:5px; margin:8px 0 4px; }
  .strength-seg{ flex:1; height:3px; border-radius:99px; background:var(--navy-line); }
  .strength-seg.active{ background:var(--green); }
  .strength-label{ font-size:10.5px; color:var(--green); font-weight:600; margin:0 0 20px; }

  .req-list{ margin-bottom:22px; }
  .req-item{ display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text-dim); margin-bottom:6px; }
  .req-item:last-child{ margin-bottom:0; }
  .req-item svg{ width:13px; height:13px; color:var(--green); flex-shrink:0; }
  .req-item.pending svg{ color:var(--text-faint); }
  .req-item.pending{ color:var(--text-faint); }

  .reset-btn{ padding:16px; border-radius:16px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); color:var(--navy); font-size:14.5px; font-weight:800; border:none; box-shadow:0 14px 30px rgba(212,160,23,0.3); font-family:'Inter',sans-serif; }

  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"></div>
  <div class="back-btn"><svg viewBox="0 0 24 24" width="15" height="15" color="#fff"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>

  <div class="hero">
    <div class="icon-badge"><svg viewBox="0 0 24 24" width="24" height="24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <h1>Create new password</h1>
    <p class="sub">Code verified. Choose a strong password you haven't used before.</p>
  </div>

  <div class="field-group">
    <span class="field-label">New password</span>
    <div class="field-box focus">
      <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
      <input type="password" value="••••••••••" />
      <svg class="eye-btn" viewBox="0 0 24 24" width="15" height="15"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
    <div class="strength-row">
      <div class="strength-seg active"></div><div class="strength-seg active"></div><div class="strength-seg active"></div><div class="strength-seg"></div>
    </div>
    <p class="strength-label">Strong password</p>
  </div>

  <div class="field-group">
    <span class="field-label">Confirm new password</span>
    <div class="field-box">
      <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
      <input type="password" value="••••••••••" />
    </div>
  </div>

  <div class="req-list">
    <div class="req-item"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>At least 8 characters</div>
    <div class="req-item"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>One number or symbol</div>
    <div class="req-item pending"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Different from your last password</div>
  </div>

  <button class="reset-btn">Reset Password</button>
</div>
</body>
</html>
