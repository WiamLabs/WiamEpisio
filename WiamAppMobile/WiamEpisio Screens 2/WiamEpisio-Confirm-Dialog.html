<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Confirm Dialog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; --red:#E4573D;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .backdrop{ position:absolute; inset:0; background:linear-gradient(160deg,#1a1030,#0d0d24,#000); filter:brightness(0.3); }
  .veil{ position:absolute; inset:0; background:rgba(0,0,0,0.5); }

  .modal{ position:absolute; top:50%; left:20px; right:20px; transform:translateY(-50%); background:var(--navy-soft); border:1px solid var(--navy-line); border-radius:20px; padding:24px 22px 20px; box-shadow:0 24px 60px rgba(0,0,0,0.5); text-align:center; }

  .modal-icon{ width:54px; height:54px; border-radius:50%; background:rgba(212,160,23,0.14); border:1px solid rgba(212,160,23,0.35); display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
  .modal-icon svg{ color:var(--gold); width:24px; height:24px; }

  .modal-title{ font-size:16px; font-weight:800; color:#fff; margin:0 0 8px; }
  .modal-sub{ font-size:12px; color:var(--text-dim); line-height:1.6; margin:0 0 22px; }
  .modal-sub b{ color:#fff; }

  .btn-row{ display:flex; gap:10px; }
  .btn-cancel{ flex:1; padding:13px; border-radius:13px; background:var(--navy-card); border:1px solid var(--navy-line); color:#C9C9DE; font-size:13px; font-weight:700; font-family:'Inter',sans-serif; }
  .btn-confirm{ flex:1; padding:13px; border-radius:13px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border:none; color:var(--navy); font-size:13px; font-weight:800; font-family:'Inter',sans-serif; }

  .label-tag{ position:absolute; bottom:24px; left:20px; right:20px; text-align:center; font-size:10px; color:var(--text-faint); background:var(--navy-card); border:1px solid var(--navy-line); border-radius:10px; padding:8px; z-index:6; }
</style>
</head>
<body>

<div class="phone">
  <div class="backdrop"></div>
  <div class="veil"></div>

  <div class="modal">
    <div class="modal-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
    <p class="modal-title">Remove from My List?</p>
    <p class="modal-sub"><b>The Chief's Daughter</b> will be removed. You can always add it back later.</p>
    <div class="btn-row">
      <button class="btn-cancel">Cancel</button>
      <button class="btn-confirm">Remove</button>
    </div>
  </div>

  <div class="label-tag">Generic confirm-dialog pattern — reused for any destructive or reversible action</div>
</div>

</body>
</html>
