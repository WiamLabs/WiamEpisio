<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Language</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#08081A; --navy-card:#12122A; --navy-line:#1E1E42; --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; }
  *{box-sizing:border-box;} body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; }
  .statusbar{ height:44px; flex-shrink:0; } svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .topbar{ display:flex; align-items:center; gap:12px; padding:2px 20px 14px; flex-shrink:0; }
  .icon-btn{ width:34px; height:34px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .topbar h1{ font-size:18px; font-weight:800; color:#fff; margin:0; }
  .search-field{ margin:0 20px 14px; display:flex; align-items:center; gap:9px; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:13px; padding:11px 14px; flex-shrink:0; }
  .search-field svg{ color:var(--text-faint); width:15px; height:15px; flex-shrink:0; } .search-field span{ color:var(--text-faint); font-size:12.5px; }
  .scroll{ flex:1; overflow-y:auto; padding:0 20px 20px; }
  .group-title{ font-size:11px; font-weight:800; color:var(--text-faint); letter-spacing:0.4px; text-transform:uppercase; margin:14px 0 10px; }
  .group-title:first-child{ margin-top:4px; }
  .lang-row{ display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--navy-line); }
  .lang-row:last-child{ border-bottom:none; }
  .flag{ width:28px; height:28px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; background:var(--navy-card); }
  .lang-name{ flex:1; font-size:13.5px; color:#E7E7F2; font-weight:500; }
  .lang-native{ font-size:11px; color:var(--text-faint); margin-left:6px; }
  .check{ width:20px; height:20px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .check svg{ width:11px; height:11px; stroke:var(--navy); stroke-width:3; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"></div>
  <div class="topbar"><div class="icon-btn"><svg viewBox="0 0 24 24" width="15" height="15" color="#fff"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div><h1>Language</h1></div>
  <div class="search-field"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>Search languages</span></div>

  <div class="scroll">
    <p class="group-title">Suggested</p>
    <div class="lang-row"><div class="flag">🇬🇭</div><span class="lang-name">English <span class="lang-native">(Ghana)</span></span><div class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    <div class="lang-row"><div class="flag">🇬🇭</div><span class="lang-name">Twi</span></div>
    <div class="lang-row"><div class="flag">🇳🇬</div><span class="lang-name">Pidgin English</span></div>

    <p class="group-title">All Languages</p>
    <div class="lang-row"><div class="flag">🇫🇷</div><span class="lang-name">Français <span class="lang-native">French</span></span></div>
    <div class="lang-row"><div class="flag">🇵🇹</div><span class="lang-name">Português <span class="lang-native">Portuguese</span></span></div>
    <div class="lang-row"><div class="flag">🇰🇪</div><span class="lang-name">Kiswahili <span class="lang-native">Swahili</span></span></div>
    <div class="lang-row"><div class="flag">🇳🇬</div><span class="lang-name">Hausa</span></div>
    <div class="lang-row"><div class="flag">🇳🇬</div><span class="lang-name">Yoruba</span></div>
    <div class="lang-row"><div class="flag">🇳🇬</div><span class="lang-name">Igbo</span></div>
    <div class="lang-row"><div class="flag">🇪🇸</div><span class="lang-name">Español <span class="lang-native">Spanish</span></span></div>
    <div class="lang-row"><div class="flag">🇸🇦</div><span class="lang-name">العربية <span class="lang-native">Arabic</span></span></div>
  </div>
</div>
</body>
</html>
