<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Login Required</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .backdrop{ position:absolute; inset:0; background:linear-gradient(160deg,#1a1030,#0d0d24,#000); filter:brightness(0.3); }

  .sheet{ position:absolute; left:0; right:0; bottom:0; background:var(--navy-soft); border-radius:26px 26px 0 0; padding:14px 24px 34px; box-shadow:0 -20px 50px rgba(0,0,0,0.5); text-align:center; }
  .sheet-handle{ width:36px; height:4px; background:var(--navy-line); border-radius:99px; margin:0 auto 22px; }

  .icon-badge{ width:64px; height:64px; border-radius:20px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; justify-content:center; margin:0 auto 18px; clip-path: polygon(30% 0%, 100% 0, 100% 100%, 30% 100%, 0% 50%); }

  .sheet-title{ font-size:17px; font-weight:800; color:#fff; margin:0 0 8px; }
  .sheet-sub{ font-size:12px; color:var(--text-dim); line-height:1.6; margin:0 0 22px; max-width:280px; margin-left:auto; margin-right:auto; }
  .sheet-sub b{ color:#fff; }

  .perk-row{ display:flex; justify-content:center; gap:20px; margin-bottom:24px; }
  .perk{ text-align:center; }
  .perk-icon{ width:38px; height:38px; border-radius:12px; background:var(--navy-card); border:1px solid var(--navy-line); display:flex; align-items:center; justify-content:center; margin:0 auto 6px; color:var(--gold); }
  .perk span{ font-size:9.5px; color:var(--text-faint); font-weight:600; }

  .btn-primary{ width:100%; padding:16px; border-radius:16px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border:none; color:var(--navy); font-size:15px; font-weight:800; box-shadow:0 14px 30px rgba(212,160,23,0.3); font-family:'Inter',sans-serif; margin-bottom:10px; }
  .btn-ghost{ width:100%; padding:14px; border-radius:16px; background:none; border:1px solid var(--navy-line); color:#C9C9DE; font-size:13px; font-weight:700; font-family:'Inter',sans-serif; margin-bottom:14px; }
  .continue-guest{ font-size:11.5px; color:var(--text-faint); font-weight:600; }
</style>
</head>
<body>

<div class="phone">
  <div class="backdrop"></div>

  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="icon-badge">W</div>

    <p class="sheet-title">Sign in to continue</p>
    <p class="sheet-sub">Following creators, saving to My List, and unlocking episodes needs a free account.</p>

    <div class="perk-row">
      <div class="perk"><div class="perk-icon"><svg viewBox="0 0 24 24" width="17" height="17"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div><span>Save Series</span></div>
      <div class="perk"><div class="perk-icon"><svg viewBox="0 0 24 24" width="17" height="17"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></div><span>Follow Creators</span></div>
      <div class="perk"><div class="perk-icon"><svg viewBox="0 0 24 24" width="17" height="17"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4.9 0c0 1.5-2.4 2-2.4 3.5"/><line x1="12" y1="16" x2="12" y2="16.01"/></svg></div><span>Free Coins</span></div>
    </div>

    <button class="btn-primary">Sign Up Free</button>
    <button class="btn-ghost">I already have an account</button>
    <span class="continue-guest">Keep browsing as guest</span>
  </div>
</div>

</body>
</html>
