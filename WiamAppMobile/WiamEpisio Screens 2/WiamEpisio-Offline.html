<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Offline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .statusbar{ height:44px; }
  .wrap{ height:calc(100% - 44px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 34px 40px; text-align:center; }

  .icon-wrap{ position:relative; width:96px; height:96px; margin-bottom:26px; }
  .icon-ring{ position:absolute; inset:0; border-radius:50%; background:var(--navy-card); border:1px solid var(--navy-line); display:flex; align-items:center; justify-content:center; }
  .icon-ring svg{ width:38px; height:38px; color:var(--text-faint); }

  h1{ font-size:19px; font-weight:800; color:#fff; margin:0 0 10px; }
  .sub{ font-size:12.5px; color:var(--text-dim); line-height:1.6; margin:0 0 28px; max-width:280px; }

  .cached-card{ width:100%; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:16px; padding:14px 16px; margin-bottom:26px; text-align:left; display:flex; gap:10px; align-items:center; }
  .cached-card svg{ width:16px; height:16px; color:var(--gold); flex-shrink:0; }
  .cached-card span{ font-size:11px; color:#D9D9E8; line-height:1.5; }

  .btn-primary{ width:100%; padding:16px; border-radius:16px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border:none; color:var(--navy); font-size:15px; font-weight:800; box-shadow:0 14px 30px rgba(212,160,23,0.3); margin-bottom:12px; font-family:'Inter',sans-serif; }
  .ghost-link{ font-size:12px; color:var(--text-dim); font-weight:600; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="wrap">
    <div class="icon-wrap">
      <div class="icon-ring"><svg viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg></div>
    </div>

    <h1>You're offline</h1>
    <p class="sub">No internet connection right now. Check your Wi-Fi or mobile data and try again.</p>

    <div class="cached-card">
      <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10v4"/><path d="M10 10v4"/></svg>
      <span>Downloaded episodes still play offline — check My List for anything saved.</span>
    </div>

    <button class="btn-primary">Try Again</button>
    <span class="ghost-link">Watch downloaded episodes</span>
  </div>
</div>

</body>
</html>
