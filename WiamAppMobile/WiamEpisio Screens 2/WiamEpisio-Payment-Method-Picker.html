<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Payment Method</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; --green:#3BB273;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .backdrop{ position:absolute; inset:0; background:linear-gradient(160deg,#1a1030,#0d0d24,#000); filter:brightness(0.3); }

  .sheet{ position:absolute; left:0; right:0; bottom:0; background:var(--navy-soft); border-radius:26px 26px 0 0; padding:14px 24px 34px; box-shadow:0 -20px 50px rgba(0,0,0,0.5); }
  .sheet-handle{ width:36px; height:4px; background:var(--navy-line); border-radius:99px; margin:0 auto 20px; }

  .sheet-title{ font-size:16px; font-weight:800; color:#fff; margin:0 0 4px; }
  .sheet-sub{ font-size:11.5px; color:var(--text-dim); margin:0 0 18px; }
  .sheet-sub b{ color:#fff; }

  .section-label{ font-size:11px; font-weight:800; color:var(--text-faint); letter-spacing:0.4px; text-transform:uppercase; margin:0 0 10px; }

  .method-item{ display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:13px; background:var(--navy-card); border:1.5px solid var(--navy-line); margin-bottom:8px; }
  .method-item.selected{ border-color:var(--gold); background:rgba(212,160,23,0.08); }
  .method-icon{ width:36px; height:36px; border-radius:10px; background:var(--navy-soft); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .method-body{ flex:1; }
  .method-name{ font-size:12.5px; font-weight:700; color:#fff; margin:0 0 2px; }
  .method-sub{ font-size:10px; color:var(--text-faint); margin:0; }
  .radio{ width:18px; height:18px; border-radius:50%; border:2px solid var(--navy-line); flex-shrink:0; }
  .method-item.selected .radio{ border-color:var(--gold); position:relative; }
  .method-item.selected .radio::after{ content:''; position:absolute; inset:3px; border-radius:50%; background:var(--gold); }
  .default-tag{ font-size:8px; font-weight:800; color:var(--green); background:rgba(59,178,115,0.14); padding:2px 6px; border-radius:4px; margin-left:6px; }

  .add-new{ display:flex; align-items:center; gap:10px; padding:13px 14px; border-radius:13px; border:1.5px dashed var(--navy-line); margin-top:6px; margin-bottom:20px; }
  .add-new svg{ width:16px; height:16px; color:var(--gold); }
  .add-new span{ font-size:12px; color:var(--gold); font-weight:700; }

  .btn-primary{ width:100%; padding:16px; border-radius:16px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border:none; color:var(--navy); font-size:15px; font-weight:800; box-shadow:0 14px 30px rgba(212,160,23,0.3); font-family:'Inter',sans-serif; }
</style>
</head>
<body>

<div class="phone">
  <div class="backdrop"></div>

  <div class="sheet">
    <div class="sheet-handle"></div>

    <p class="sheet-title">Choose payment method</p>
    <p class="sheet-sub">Paying <b>₵50.00</b> for 650 Coins</p>

    <p class="section-label">Saved methods</p>

    <div class="method-item selected">
      <div class="method-icon">📱</div>
      <div class="method-body"><p class="method-name">MTN Mobile Money<span class="default-tag">DEFAULT</span></p><p class="method-sub">•••• 0187</p></div>
      <div class="radio"></div>
    </div>

    <div class="method-item">
      <div class="method-icon">💳</div>
      <div class="method-body"><p class="method-name">Visa •••• 4471</p><p class="method-sub">Expires 08/28</p></div>
      <div class="radio"></div>
    </div>

    <p class="section-label" style="margin-top:16px;">Other options</p>

    <div class="method-item">
      <div class="method-icon">📱</div>
      <div class="method-body"><p class="method-name">Telecel Cash</p><p class="method-sub">Add a new number</p></div>
      <div class="radio"></div>
    </div>

    <div class="method-item">
      <div class="method-icon">🏦</div>
      <div class="method-body"><p class="method-name">Bank Transfer</p><p class="method-sub">Direct from your bank</p></div>
      <div class="radio"></div>
    </div>

    <div class="add-new">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Add new payment method</span>
    </div>

    <button class="btn-primary">Continue with MTN Mobile Money</button>
  </div>
</div>

</body>
</html>
