<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Filter &amp; Sort</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .backdrop{ position:absolute; inset:0; background:linear-gradient(160deg,#1a1030,#0d0d24,#000); filter:brightness(0.3); }

  .sheet{ position:absolute; left:0; right:0; bottom:0; background:var(--navy-soft); border-radius:26px 26px 0 0; padding:14px 24px 30px; box-shadow:0 -20px 50px rgba(0,0,0,0.5); max-height:85%; display:flex; flex-direction:column; }
  .sheet-handle{ width:36px; height:4px; background:var(--navy-line); border-radius:99px; margin:0 auto 18px; flex-shrink:0; }

  .sheet-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-shrink:0; }
  .sheet-title{ font-size:16px; font-weight:800; color:#fff; margin:0; }
  .reset-link{ font-size:11.5px; color:var(--gold); font-weight:700; }

  .scroll{ overflow-y:auto; flex:1; }

  .section-label{ font-size:11px; font-weight:800; color:var(--text-faint); letter-spacing:0.4px; text-transform:uppercase; margin:0 0 12px; }
  .section-block{ margin-bottom:22px; }

  .sort-option{ display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--navy-line); }
  .sort-option:last-child{ border-bottom:none; }
  .sort-option span{ font-size:12.5px; color:#E7E7F2; font-weight:500; }
  .sort-radio{ width:18px; height:18px; border-radius:50%; border:2px solid var(--navy-line); }
  .sort-radio.on{ border-color:var(--gold); position:relative; }
  .sort-radio.on::after{ content:''; position:absolute; inset:3px; border-radius:50%; background:var(--gold); }

  .chip-grid{ display:flex; flex-wrap:wrap; gap:8px; }
  .filter-chip{ padding:9px 15px; border-radius:999px; background:var(--navy-card); border:1px solid var(--navy-line); color:#B8B8CC; font-size:12px; font-weight:600; }
  .filter-chip.active{ background:var(--gold); color:var(--navy); border-color:var(--gold); }

  .toggle-row{ display:flex; align-items:center; justify-content:space-between; padding:12px 0; }
  .toggle-row span{ font-size:12.5px; color:#E7E7F2; font-weight:500; }
  .toggle{ width:42px; height:24px; border-radius:99px; position:relative; }
  .toggle.on{ background:var(--gold); }
  .toggle.off{ background:var(--navy-line); }
  .toggle-knob{ position:absolute; top:2px; width:20px; height:20px; border-radius:50%; background:#fff; }
  .toggle.on .toggle-knob{ right:2px; }
  .toggle.off .toggle-knob{ left:2px; }

  .footer{ flex-shrink:0; padding-top:14px; }
  .btn-primary{ width:100%; padding:16px; border-radius:16px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border:none; color:var(--navy); font-size:15px; font-weight:800; box-shadow:0 14px 30px rgba(212,160,23,0.3); font-family:'Inter',sans-serif; }
</style>
</head>
<body>

<div class="phone">
  <div class="backdrop"></div>

  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head"><p class="sheet-title">Filter &amp; Sort</p><span class="reset-link">Reset</span></div>

    <div class="scroll">

      <div class="section-block">
        <p class="section-label">Sort By</p>
        <div class="sort-option"><span>Most Relevant</span><div class="sort-radio on"></div></div>
        <div class="sort-option"><span>Most Popular</span><div class="sort-radio"></div></div>
        <div class="sort-option"><span>Newest First</span><div class="sort-radio"></div></div>
        <div class="sort-option"><span>A–Z</span><div class="sort-radio"></div></div>
      </div>

      <div class="section-block">
        <p class="section-label">Genre</p>
        <div class="chip-grid">
          <span class="filter-chip active">Drama</span>
          <span class="filter-chip active">Revenge</span>
          <span class="filter-chip">Romance</span>
          <span class="filter-chip">Royal &amp; Palace</span>
          <span class="filter-chip">Thriller</span>
          <span class="filter-chip">Comedy</span>
        </div>
      </div>

      <div class="section-block">
        <p class="section-label">Status</p>
        <div class="chip-grid">
          <span class="filter-chip">Completed</span>
          <span class="filter-chip">Ongoing</span>
          <span class="filter-chip">Coming Soon</span>
        </div>
      </div>

      <div class="section-block">
        <div class="toggle-row"><span>Free episodes only</span><div class="toggle off"><div class="toggle-knob"></div></div></div>
        <div class="toggle-row"><span>Wiam Origin only</span><div class="toggle off"><div class="toggle-knob"></div></div></div>
      </div>

    </div>

    <div class="footer">
      <button class="btn-primary">Show 84 Results</button>
    </div>
  </div>
</div>

</body>
</html>
