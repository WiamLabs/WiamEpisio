<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Splash (Returning)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .glow-bg{ position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); width:460px; height:460px; background:radial-gradient(circle, rgba(212,160,23,0.18), transparent 65%); }

  .statusbar{ height:44px; position:relative; z-index:2; }

  .wrap{ position:relative; z-index:2; height:calc(100% - 44px); display:flex; flex-direction:column; align-items:center; justify-content:center; }

  .logo-badge{ width:66px; height:66px; border-radius:20px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:800; font-size:28px; margin-bottom:20px; clip-path: polygon(30% 0%, 100% 0, 100% 100%, 30% 100%, 0% 50%); box-shadow:0 16px 40px rgba(212,160,23,0.35); }

  .wordmark{ font-size:22px; font-weight:800; color:#fff; margin:0 0 30px; letter-spacing:-0.4px; }
  .wordmark span{ color:var(--gold); }

  /* Welcome-back personalization — the key difference from first-time Splash */
  .welcome-card{ display:flex; align-items:center; gap:11px; background:var(--navy-card); border-radius:14px; padding:11px 16px; margin-bottom:34px; }
  .welcome-avatar{ width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:800; font-size:13px; flex-shrink:0; }
  .welcome-text{ font-size:12px; color:#E7E7F2; font-weight:600; }
  .welcome-text b{ color:var(--gold); }

  .spinner{ width:26px; height:26px; border-radius:50%; border:3px solid rgba(212,160,23,0.2); border-top-color:var(--gold); }

  .resume-hint{ position:absolute; bottom:50px; left:0; right:0; text-align:center; font-size:11px; color:var(--text-faint); }
  .resume-hint b{ color:var(--text-dim); }
</style>
</head>
<body>

<div class="phone">
  <div class="glow-bg"></div>
  <div class="statusbar"></div>

  <div class="wrap">
    <div class="logo-badge">W</div>
    <p class="wordmark">Wiam<span>Episio</span></p>

    <div class="welcome-card">
      <div class="welcome-avatar">A</div>
      <div class="welcome-text">Welcome back, <b>Ama</b></div>
    </div>

    <div class="spinner"></div>
  </div>

  <p class="resume-hint">Picking up where you left off in <b>The Chief's Daughter</b></p>
</div>

</body>
</html>
