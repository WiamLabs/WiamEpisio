<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Verify Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#08081A; --navy-card:#12122A; --navy-line:#1E1E42; --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; padding:0 26px; }
  .statusbar{ height:44px; }
  .back-btn{ width:34px; height:34px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; margin-bottom:26px; }

  .hero{ margin-bottom:32px; }
  h1{ font-size:22px; font-weight:800; color:#fff; margin:0 0 8px; letter-spacing:-0.3px; }
  .sub{ font-size:12.5px; color:var(--text-dim); margin:0; line-height:1.6; }
  .sub b{ color:#fff; font-weight:700; }

  .otp-row{ display:flex; gap:9px; margin-bottom:26px; }
  .otp-box{ flex:1; aspect-ratio:1; border-radius:14px; background:var(--navy-card); border:1.5px solid var(--navy-line); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800; color:#fff; }
  .otp-box.filled{ border-color:var(--gold); }
  .otp-box.active{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(212,160,23,0.15); }

  .timer-row{ text-align:center; margin-bottom:26px; }
  .timer-row span{ font-size:12.5px; color:var(--text-dim); }
  .timer-row b{ color:var(--gold); font-weight:800; }

  .verify-btn{ padding:16px; border-radius:16px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); color:var(--navy); font-size:14.5px; font-weight:800; border:none; margin-bottom:20px; box-shadow:0 14px 30px rgba(212,160,23,0.3); font-family:'Inter',sans-serif; }

  .bottom{ margin-top:auto; padding-bottom:28px; text-align:center; }
  .resend-link{ font-size:13px; color:var(--text-dim); }
  .resend-link span{ color:var(--gold); font-weight:700; }

  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"></div>
  <div class="back-btn"><svg viewBox="0 0 24 24" width="15" height="15" color="#fff"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>

  <div class="hero">
    <h1>Enter verification code</h1>
    <p class="sub">We sent a 6-digit code to <b>ama.owusu@gmail.com</b></p>
  </div>

  <div class="otp-row">
    <div class="otp-box filled">4</div>
    <div class="otp-box filled">8</div>
    <div class="otp-box filled">2</div>
    <div class="otp-box active">1</div>
    <div class="otp-box"></div>
    <div class="otp-box"></div>
  </div>

  <div class="timer-row"><span>Code expires in <b>02:47</b></span></div>

  <button class="verify-btn">Verify Code</button>

  <div class="bottom">
    <p class="resend-link">Didn't get it? <span>Resend code</span></p>
  </div>
</div>
</body>
</html>
