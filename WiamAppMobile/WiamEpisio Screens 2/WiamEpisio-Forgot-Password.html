<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Forgot Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#08081A; --navy-card:#12122A; --navy-line:#1E1E42; --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; padding:0 26px; }
  .statusbar{ height:44px; }
  .back-btn{ width:34px; height:34px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; margin-bottom:26px; }

  .hero{ margin-bottom:30px; }
  .icon-badge{ width:52px; height:52px; border-radius:16px; background:var(--navy-card); border:1px solid var(--navy-line); display:flex; align-items:center; justify-content:center; margin-bottom:18px; color:var(--gold); }
  h1{ font-size:22px; font-weight:800; color:#fff; margin:0 0 8px; letter-spacing:-0.3px; }
  .sub{ font-size:12.5px; color:var(--text-dim); margin:0; line-height:1.6; }

  .field-group{ margin-bottom:20px; }
  .field-label{ font-size:11.5px; font-weight:600; color:var(--text-dim); margin:0 0 7px; display:block; }
  .field-box{ background:var(--navy-card); border:1px solid var(--navy-line); border-radius:14px; padding:13px 14px; display:flex; align-items:center; gap:10px; }
  .field-box.focus{ border-color:var(--gold); }
  .field-box svg{ color:var(--gold); flex-shrink:0; width:15px; height:15px; }
  .field-box input{ background:none; border:none; outline:none; color:#fff; font-size:13.5px; font-family:inherit; width:100%; }
  .field-box input::placeholder{ color:var(--text-faint); }

  .method-toggle{ display:flex; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:12px; padding:3px; margin-bottom:20px; }
  .method-opt{ flex:1; text-align:center; padding:9px; border-radius:9px; font-size:12px; font-weight:700; color:var(--text-dim); }
  .method-opt.active{ background:var(--gold); color:var(--navy); }

  .send-btn{ padding:16px; border-radius:16px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); color:var(--navy); font-size:14.5px; font-weight:800; border:none; margin-bottom:20px; box-shadow:0 14px 30px rgba(212,160,23,0.3); font-family:'Inter',sans-serif; }

  .bottom{ margin-top:auto; padding-bottom:28px; text-align:center; }
  .login-link{ font-size:13px; color:var(--text-dim); }
  .login-link span{ color:var(--gold); font-weight:700; }

  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"></div>
  <div class="back-btn"><svg viewBox="0 0 24 24" width="15" height="15" color="#fff"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>

  <div class="hero">
    <div class="icon-badge"><svg viewBox="0 0 24 24" width="24" height="24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>
    <h1>Forgot password?</h1>
    <p class="sub">No worries — we'll send you a code to reset it.</p>
  </div>

  <div class="method-toggle">
    <div class="method-opt active">Email</div>
    <div class="method-opt">Phone Number</div>
  </div>

  <div class="field-group">
    <span class="field-label">Email</span>
    <div class="field-box focus">
      <svg viewBox="0 0 24 24"><path d="M22 6l-10 7L2 6"/><path d="M2 6h20v12H2z"/></svg>
      <input placeholder="you@email.com" value="ama.owusu@gmail.com" />
    </div>
  </div>

  <button class="send-btn">Send Reset Code</button>

  <div class="bottom">
    <p class="login-link">Remember your password? <span>Sign in</span></p>
  </div>
</div>
</body>
</html>
