<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamStudio — Episode List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; --green:#3BB273;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; }
  .statusbar{ height:44px; flex-shrink:0; }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .topbar{ display:flex; align-items:center; gap:12px; padding:2px 20px 12px; flex-shrink:0; }
  .icon-btn{ width:34px; height:34px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .topbar h1{ font-size:16px; font-weight:800; color:#fff; margin:0; flex:1; }
  .add-btn{ display:flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; color:var(--gold); }

  .progress-strip{ margin:0 20px 14px; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:12px; padding:10px 14px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .progress-strip span{ font-size:11px; color:var(--text-dim); font-weight:600; }
  .progress-strip b{ color:#fff; }
  .mini-bar{ width:80px; height:5px; background:var(--navy-line); border-radius:99px; overflow:hidden; }
  .mini-fill{ height:100%; background:var(--gold); border-radius:99px; }

  .scroll{ flex:1; overflow-y:auto; padding:0 20px 20px; }

  .ep-row{ display:flex; align-items:center; gap:10px; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:14px; padding:10px 12px; margin-bottom:9px; }
  .drag-handle{ color:var(--text-faint); flex-shrink:0; }
  .ep-thumb{ width:40px; height:58px; border-radius:8px; flex-shrink:0; position:relative; }
  .ep-thumb.t1{ background:linear-gradient(160deg,#241a3a,#0d0d24); }
  .ep-thumb.t2{ background:linear-gradient(160deg,#1a2a3a,#12122a); }
  .ep-thumb.t3{ background:var(--navy-soft); }
  .ep-body{ flex:1; min-width:0; }
  .ep-title{ font-size:12px; font-weight:700; color:#fff; margin:0 0 3px; }
  .ep-meta{ font-size:10px; color:var(--text-faint); margin:0; }
  .status-dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .status-dot.ready{ background:var(--green); }
  .status-dot.processing{ background:#4C8DFF; }
  .status-dot.draft{ background:var(--text-faint); }
  .more-btn{ color:var(--text-faint); flex-shrink:0; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="topbar">
    <div class="icon-btn"><svg viewBox="0 0 24 24" width="15" height="15" color="#fff"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
    <h1>Episodes</h1>
    <span class="add-btn"><svg viewBox="0 0 24 24" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add</span>
  </div>

  <div class="progress-strip">
    <span><b>12</b> of 20 episodes uploaded</span>
    <div class="mini-bar"><div class="mini-fill" style="width:60%;"></div></div>
  </div>

  <div class="scroll">

    <div class="ep-row">
      <svg class="drag-handle" viewBox="0 0 24 24" width="14" height="14"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg>
      <div class="ep-thumb t1"></div>
      <div class="ep-body"><p class="ep-title">EP 1 — The Return</p><p class="ep-meta">4:32 · Ready</p></div>
      <div class="status-dot ready"></div>
      <svg class="more-btn" viewBox="0 0 24 24" width="15" height="15"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </div>

    <div class="ep-row">
      <svg class="drag-handle" viewBox="0 0 24 24" width="14" height="14"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg>
      <div class="ep-thumb t2"></div>
      <div class="ep-body"><p class="ep-title">EP 2 — Old Wounds</p><p class="ep-meta">4:18 · Ready</p></div>
      <div class="status-dot ready"></div>
      <svg class="more-btn" viewBox="0 0 24 24" width="15" height="15"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </div>

    <div class="ep-row">
      <svg class="drag-handle" viewBox="0 0 24 24" width="14" height="14"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg>
      <div class="ep-thumb t3"></div>
      <div class="ep-body"><p class="ep-title">EP 3 — The Accusation</p><p class="ep-meta">5:02 · Ready</p></div>
      <div class="status-dot ready"></div>
      <svg class="more-btn" viewBox="0 0 24 24" width="15" height="15"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </div>

    <div class="ep-row">
      <svg class="drag-handle" viewBox="0 0 24 24" width="14" height="14"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg>
      <div class="ep-thumb t1"></div>
      <div class="ep-body"><p class="ep-title">EP 11 — Processing…</p><p class="ep-meta">Transcoding 64%</p></div>
      <div class="status-dot processing"></div>
      <svg class="more-btn" viewBox="0 0 24 24" width="15" height="15"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </div>

    <div class="ep-row">
      <svg class="drag-handle" viewBox="0 0 24 24" width="14" height="14"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg>
      <div class="ep-thumb t2" style="opacity:0.4; display:flex; align-items:center; justify-content:center;"><svg viewBox="0 0 24 24" width="16" height="16" color="#5A5A75"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
      <div class="ep-body"><p class="ep-title" style="color:var(--text-faint);">EP 13 — Not uploaded</p><p class="ep-meta">Draft slot</p></div>
      <div class="status-dot draft"></div>
      <svg class="more-btn" viewBox="0 0 24 24" width="15" height="15"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </div>

  </div>
</div>

</body>
</html>
