<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Application Submitted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; --green:#3BB273;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }

  .glow-bg{ position:absolute; top:60px; left:50%; transform:translateX(-50%); width:420px; height:420px; background:radial-gradient(circle, rgba(212,160,23,0.20), transparent 65%); }

  .wrap{ position:relative; z-index:2; height:calc(100% - 44px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 30px 60px; text-align:center; }

  .badge-ring{ width:104px; height:104px; margin-bottom:26px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; justify-content:center; box-shadow:0 16px 40px rgba(212,160,23,0.4); }

  h1{ font-size:23px; font-weight:800; color:#fff; margin:0 0 10px; letter-spacing:-0.3px; }
  .sub{ font-size:13px; color:var(--text-dim); line-height:1.6; margin:0 0 28px; max-width:280px; }
  .sub b{ color:#fff; font-weight:700; }

  .timeline-card{ width:100%; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:16px; padding:16px 17px; margin-bottom:24px; text-align:left; }
  .tl-row{ display:flex; gap:10px; margin-bottom:12px; }
  .tl-row:last-child{ margin-bottom:0; }
  .tl-dot{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .tl-dot.done{ background:rgba(59,178,115,0.16); }
  .tl-dot.done svg{ color:var(--green); width:12px; height:12px; }
  .tl-dot.wait{ background:var(--navy-soft); border:1px solid var(--navy-line); }
  .tl-text b{ font-size:12px; font-weight:700; color:#fff; display:block; }
  .tl-text span{ font-size:10.5px; color:var(--text-faint); }

  .btn-primary{ width:100%; padding:16px; border-radius:16px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border:none; color:var(--navy); font-size:15.5px; font-weight:800; box-shadow:0 14px 30px rgba(212,160,23,0.3); margin-bottom:14px; font-family:'Inter',sans-serif; }
  .ghost-link{ font-size:12.5px; color:var(--text-dim); font-weight:600; }

  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="glow-bg"></div>

  <div class="wrap">
    <div class="badge-ring"><svg viewBox="0 0 24 24" width="42" height="42" stroke="#08081A" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg></div>

    <h1>Application sent</h1>
    <p class="sub">We'll review your sample and reply within <b>3–5 business days</b>. No need to do anything else for now.</p>

    <div class="timeline-card">
      <div class="tl-row">
        <div class="tl-dot done"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="tl-text"><b>Application submitted</b><span>Today, 2:14 PM</span></div>
      </div>
      <div class="tl-row">
        <div class="tl-dot wait"></div>
        <div class="tl-text"><b>Team reviews your sample</b><span>Within 3–5 business days</span></div>
      </div>
      <div class="tl-row">
        <div class="tl-dot wait"></div>
        <div class="tl-text"><b>WiamStudio access unlocked</b><span>Email + in-app notification</span></div>
      </div>
    </div>

    <button class="btn-primary">Back to Home</button>
    <span class="ghost-link">Check application status anytime in Profile</span>
  </div>
</div>

</body>
</html>
