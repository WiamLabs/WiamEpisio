<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Daily Rewards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; --green:#3BB273;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .statusbar{ height:44px; flex-shrink:0; }

  .topbar{ display:flex; align-items:center; gap:12px; padding:2px 20px 4px; flex-shrink:0; }
  .icon-btn{ width:34px; height:34px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .topbar h1{ font-size:18px; font-weight:800; color:#fff; margin:0; }

  .hero{ text-align:center; padding:16px 24px 22px; flex-shrink:0; }
  .streak-badge{ width:70px; height:70px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; justify-content:center; margin:0 auto 12px; box-shadow:0 12px 30px rgba(212,160,23,0.3); }
  .hero h2{ font-size:16px; font-weight:800; color:#fff; margin:0 0 4px; }
  .hero p{ font-size:11.5px; color:var(--text-dim); margin:0; }
  .hero p b{ color:var(--gold); }

  .scroll{ flex:1; overflow-y:auto; padding:0 20px 20px; }

  .days-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
  .day-card{ border-radius:14px; padding:12px 6px; text-align:center; background:var(--navy-card); border:1px solid var(--navy-line); }
  .day-card.done{ background:rgba(59,178,115,0.1); border-color:rgba(59,178,115,0.35); }
  .day-card.today{ background:linear-gradient(160deg, rgba(212,160,23,0.18), rgba(18,18,42,0.9)); border-color:var(--gold); }
  .day-num{ font-size:9.5px; font-weight:700; color:var(--text-faint); margin-bottom:8px; }
  .day-card.done .day-num{ color:var(--green); }
  .day-card.today .day-num{ color:var(--gold); }
  .day-icon{ width:30px; height:30px; border-radius:50%; margin:0 auto 6px; display:flex; align-items:center; justify-content:center; }
  .day-card:not(.done):not(.today) .day-icon{ background:var(--navy-soft); }
  .day-card.done .day-icon{ background:var(--green); }
  .day-card.done .day-icon svg{ color:#08081A; width:14px; height:14px; stroke-width:3; }
  .day-card.today .day-icon{ background:var(--gold); }
  .day-amt{ font-size:11px; font-weight:800; color:#fff; }
  .day-card.today .day-amt{ color:var(--gold); }
  .day-card.big{ grid-column:span 4; padding:16px; display:flex; align-items:center; justify-content:space-between; text-align:left; }
  .day-card.big .day-amt{ font-size:15px; }

  .claim-btn{ width:100%; padding:16px; border-radius:16px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border:none; color:var(--navy); font-size:15px; font-weight:800; box-shadow:0 14px 30px rgba(212,160,23,0.3); font-family:'Inter',sans-serif; margin-bottom:16px; }

  .missed-note{ display:flex; gap:9px; font-size:11px; color:var(--text-dim); line-height:1.6; padding:0 2px; }
  .missed-note svg{ width:14px; height:14px; color:var(--text-faint); flex-shrink:0; margin-top:1px; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="topbar">
    <div class="icon-btn"><svg viewBox="0 0 24 24" width="15" height="15" color="#fff"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
    <h1>Daily Rewards</h1>
  </div>

  <div class="hero">
    <div class="streak-badge"><svg viewBox="0 0 24 24" width="30" height="30" stroke="#08081A" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></div>
    <h2>4-Day Streak</h2>
    <p>Come back tomorrow for <b>Day 5</b> — don't break the streak!</p>
  </div>

  <div class="scroll">

    <div class="days-grid">
      <div class="day-card done"><div class="day-num">DAY 1</div><div class="day-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="day-amt">+5</div></div>
      <div class="day-card done"><div class="day-num">DAY 2</div><div class="day-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="day-amt">+5</div></div>
      <div class="day-card done"><div class="day-num">DAY 3</div><div class="day-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="day-amt">+10</div></div>
      <div class="day-card today"><div class="day-num">DAY 4</div><div class="day-icon">🎁</div><div class="day-amt">+10</div></div>
      <div class="day-card"><div class="day-num">DAY 5</div><div class="day-icon">🎁</div><div class="day-amt">+15</div></div>
      <div class="day-card"><div class="day-num">DAY 6</div><div class="day-icon">🎁</div><div class="day-amt">+15</div></div>
      <div class="day-card"><div class="day-num">DAY 7</div><div class="day-icon">🎁</div><div class="day-amt">+20</div></div>
      <div class="day-card big">
        <div><div class="day-num" style="margin-bottom:3px;">DAY 30 · GRAND PRIZE</div><div class="day-amt">+500 coins bonus</div></div>
        <div style="font-size:26px;">👑</div>
      </div>
    </div>

    <button class="claim-btn">Claim Today's Reward — +10 Coins</button>

    <div class="missed-note">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Miss a day and your streak resets to Day 1. Rewards refresh daily at midnight GMT.</span>
    </div>

  </div>
</div>

</body>
</html>
