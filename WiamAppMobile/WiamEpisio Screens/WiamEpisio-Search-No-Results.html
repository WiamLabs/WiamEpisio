<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Search: No Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; }
  .statusbar{ height:44px; flex-shrink:0; }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .topbar{ display:flex; align-items:center; gap:10px; padding:2px 20px 14px; flex-shrink:0; }
  .icon-btn{ width:34px; height:34px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .search-field{ flex:1; display:flex; align-items:center; gap:9px; background:var(--navy-card); border:1.5px solid var(--navy-line); border-radius:12px; padding:10px 13px; }
  .search-field svg{ color:var(--text-faint); width:15px; height:15px; flex-shrink:0; }
  .search-field input{ background:none; border:none; outline:none; color:#fff; font-size:13px; font-family:inherit; width:100%; }
  .clear-x{ color:var(--text-faint); flex-shrink:0; }

  .scroll{ flex:1; overflow-y:auto; padding:0 24px 20px; }

  .empty-block{ text-align:center; padding:50px 0 30px; }
  .empty-icon{ width:76px; height:76px; border-radius:50%; background:var(--navy-card); border:1px solid var(--navy-line); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
  .empty-icon svg{ width:30px; height:30px; color:var(--text-faint); }
  .empty-title{ font-size:16px; font-weight:800; color:#fff; margin:0 0 8px; }
  .empty-sub{ font-size:12.5px; color:var(--text-dim); line-height:1.6; margin:0 0 4px; max-width:260px; margin-left:auto; margin-right:auto; }
  .empty-sub b{ color:#fff; }

  .tips-title{ font-size:12px; font-weight:800; color:var(--text-dim); letter-spacing:0.4px; text-transform:uppercase; margin:20px 0 12px; text-align:left; }
  .tip-row{ display:flex; gap:9px; margin-bottom:10px; text-align:left; }
  .tip-row svg{ width:14px; height:14px; color:var(--gold); flex-shrink:0; margin-top:2px; }
  .tip-row span{ font-size:11.5px; color:#C9C9DE; line-height:1.5; }

  .suggest-title{ font-size:12px; font-weight:800; color:var(--text-dim); letter-spacing:0.4px; text-transform:uppercase; margin:22px 0 12px; text-align:left; }
  .suggest-chips{ display:flex; gap:8px; flex-wrap:wrap; }
  .suggest-chip{ padding:9px 15px; border-radius:999px; background:var(--navy-card); border:1px solid var(--navy-line); color:#B8B8CC; font-size:12px; font-weight:600; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="topbar">
    <div class="icon-btn"><svg viewBox="0 0 24 24" width="15" height="15" color="#fff"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
    <div class="search-field">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input value="zxqwerty drama" />
      <svg class="clear-x" viewBox="0 0 24 24" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>

  <div class="scroll">

    <div class="empty-block">
      <div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg></div>
      <p class="empty-title">No results for "zxqwerty drama"</p>
      <p class="empty-sub">Try a different spelling, or browse by genre instead.</p>
    </div>

    <p class="tips-title">Search tips</p>
    <div class="tip-row"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span>Check for typos in series or creator names</span></div>
    <div class="tip-row"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span>Use fewer, more general keywords</span></div>
    <div class="tip-row"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span>Try searching by genre, like "Revenge" or "Royal"</span></div>

    <p class="suggest-title">Popular right now</p>
    <div class="suggest-chips">
      <span class="suggest-chip">The King's Forgotten Son</span>
      <span class="suggest-chip">Accra Nights</span>
      <span class="suggest-chip">Drama</span>
      <span class="suggest-chip">Revenge</span>
    </div>

  </div>
</div>

</body>
</html>
