<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — VIP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; }
  .statusbar{ height:44px; flex-shrink:0; }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .topbar{ display:flex; align-items:center; gap:12px; padding:2px 20px 14px; flex-shrink:0; }
  .icon-btn{ width:34px; height:34px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .topbar h1{ font-size:18px; font-weight:800; color:#fff; margin:0; display:flex; align-items:center; gap:7px; }
  .topbar h1 svg{ color:var(--gold); width:17px; height:17px; }

  .scroll{ flex:1; overflow-y:auto; padding:0 20px 84px; }

  .vip-banner{ position:relative; border-radius:18px; overflow:hidden; padding:16px 17px; margin-bottom:20px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; gap:13px; }
  .vip-icon{ width:42px; height:42px; border-radius:12px; background:rgba(8,8,26,0.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .vip-icon svg{ color:var(--navy); width:22px; height:22px; }
  .vip-banner b{ display:block; font-size:14px; font-weight:800; color:var(--navy); margin-bottom:2px; }
  .vip-banner span{ font-size:11px; color:rgba(8,8,26,0.75); font-weight:600; }
  .vip-cta{ margin-left:auto; padding:9px 15px; border-radius:10px; background:var(--navy); color:var(--gold); font-size:11.5px; font-weight:800; white-space:nowrap; flex-shrink:0; }

  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .card{ border-radius:14px; overflow:hidden; }
  .card-art{ aspect-ratio:2/3; border-radius:14px; position:relative; overflow:hidden; }
  .card-art.g1{ background:linear-gradient(160deg,#3a1420,#12122a); }
  .card-art.g2{ background:linear-gradient(160deg,#1a2a3a,#12122a); }
  .card-art.g3{ background:linear-gradient(160deg,#241a3a,#0d0d24); }
  .card-art.g4{ background:linear-gradient(160deg,#3a2a14,#12122a); }
  .card-veil{ position:absolute; inset:0; background:rgba(8,8,26,0.5); backdrop-filter:blur(1px); display:flex; align-items:center; justify-content:center; }
  .lock-badge{ width:38px; height:38px; border-radius:50%; background:rgba(212,160,23,0.9); display:flex; align-items:center; justify-content:center; }
  .lock-badge svg{ color:var(--navy); width:17px; height:17px; }
  .vip-tag{ position:absolute; top:8px; left:8px; font-size:8px; font-weight:800; color:var(--navy); background:var(--gold); padding:3px 7px; border-radius:5px; }
  .card-title{ font-size:12px; font-weight:700; color:#fff; margin:8px 0 2px; }
  .card-meta{ font-size:10px; color:var(--text-dim); margin:0; }

  .bottomnav{ position:absolute; bottom:0; left:0; right:0; height:84px; background:var(--navy-soft); border-top:1px solid #1C1C38; display:flex; align-items:flex-start; justify-content:space-around; padding-top:12px; }
  .navitem{ display:flex; flex-direction:column; align-items:center; gap:4px; width:60px; }
  .navitem span{ font-size:9.5px; }
  .navitem svg{ width:20px; height:20px; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="topbar">
    <div class="icon-btn"><svg viewBox="0 0 24 24" width="15" height="15" color="#fff"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
    <h1><svg viewBox="0 0 24 24"><path d="M12 2l2.4 2.6 3.5-.6.6 3.5L21.1 9l-2 3 2 3-3.6 1.5-.6 3.5-3.5-.6L12 22l-2.4-2.6-3.5.6-.6-3.5L2 15l2-3-2-3 3.6-1.5.6-3.5 3.5.6z" fill="currentColor" stroke="none"/></svg>VIP Collection</h1>
  </div>

  <div class="scroll">

    <div class="vip-banner">
      <div class="vip-icon"><svg viewBox="0 0 24 24" fill="var(--navy)" stroke="none"><path d="M12 2l2.4 2.6 3.5-.6.6 3.5L21.1 9l-2 3 2 3-3.6 1.5-.6 3.5-3.5-.6L12 22l-2.4-2.6-3.5.6-.6-3.5L2 15l2-3-2-3 3.6-1.5.6-3.5 3.5.6z"/></svg></div>
      <div><b>Unlock all VIP titles</b><span>Early access + zero coin cost</span></div>
      <span class="vip-cta">Join VIP</span>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-art g1"><span class="vip-tag">VIP</span><div class="card-veil"><div class="lock-badge"><svg viewBox="0 0 24 24" stroke="var(--navy)" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div></div></div>
        <p class="card-title">Silent Vows</p>
        <p class="card-meta">Drama · VIP Exclusive</p>
      </div>
      <div class="card">
        <div class="card-art g2"><span class="vip-tag">VIP</span><div class="card-veil"><div class="lock-badge"><svg viewBox="0 0 24 24" stroke="var(--navy)" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div></div></div>
        <p class="card-title">The Widow's Second Chance</p>
        <p class="card-meta">Romance · VIP Exclusive</p>
      </div>
      <div class="card">
        <div class="card-art g3"><span class="vip-tag">VIP</span><div class="card-veil"><div class="lock-badge"><svg viewBox="0 0 24 24" stroke="var(--navy)" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div></div></div>
        <p class="card-title">Palace of Lies</p>
        <p class="card-meta">Royal · VIP Exclusive</p>
      </div>
      <div class="card">
        <div class="card-art g4"><span class="vip-tag">VIP</span><div class="card-veil"><div class="lock-badge"><svg viewBox="0 0 24 24" stroke="var(--navy)" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div></div></div>
        <p class="card-title">Twin Flames</p>
        <p class="card-meta">Thriller · VIP Exclusive</p>
      </div>
    </div>

  </div>

  <div class="bottomnav">
    <div class="navitem active"><svg viewBox="0 0 24 24" fill="#D4A017" stroke="none"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10" fill="none" stroke="#D4A017" stroke-width="1.8"/></svg><span style="color:#D4A017">Home</span></div>
    <div class="navitem" style="color:#5A5A75"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>Discover</span></div>
    <div class="navitem" style="color:#5A5A75"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="3"/><polygon points="10 9 10 15 15 12" fill="#5A5A75"/></svg><span>Member</span></div>
    <div class="navitem" style="color:#5A5A75"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span>My List</span></div>
    <div class="navitem" style="color:#5A5A75"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></div>
  </div>
</div>

</body>
</html>
