<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }

  /* Poster collage backdrop */
  .collage{ position:absolute; inset:0; top:44px; height:56%; display:grid; grid-template-columns:repeat(3,1fr); gap:6px; padding:0 6px; transform:scale(1.06) rotate(0deg); }
  .tile{ border-radius:16px; position:relative; overflow:hidden; }
  .tile:nth-child(1){ background:linear-gradient(160deg,#3a1420,#12122a); margin-top:-30px; }
  .tile:nth-child(2){ background:linear-gradient(160deg,#2a1a3a,#0d0d24); }
  .tile:nth-child(3){ background:linear-gradient(160deg,#1a2a3a,#12122a); margin-top:-14px; }
  .tile:nth-child(4){ background:linear-gradient(160deg,#3a2a14,#12122a); margin-top:10px; }
  .tile:nth-child(5){ background:linear-gradient(160deg,#241a3a,#0d0d24); margin-top:-10px; }
  .tile:nth-child(6){ background:linear-gradient(160deg,#3a1414,#12122a); margin-top:16px; }
  .tile-glow{ position:absolute; inset:0; background:radial-gradient(circle at 50% 30%, rgba(212,160,23,0.10), transparent 60%); }
  .tile-play{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; }

  .veil{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(8,8,26,0.15) 0%, rgba(8,8,26,0.55) 42%, var(--navy) 78%); }

  .skip{ position:absolute; top:20px; right:20px; z-index:5; font-size:12.5px; font-weight:600; color:var(--text-dim); background:rgba(18,18,42,0.6); padding:7px 14px; border-radius:999px; backdrop-filter:blur(6px); }

  .content{ position:absolute; left:0; right:0; bottom:0; padding:0 28px 40px; text-align:center; z-index:2; }

  .mark{ width:64px; height:64px; margin:0 auto 20px; border-radius:20px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:900; font-size:30px; box-shadow:0 12px 34px rgba(212,160,23,0.35); clip-path: polygon(30% 0%, 100% 0, 100% 100%, 30% 100%, 0% 50%); }

  .wordmark{ font-size:29px; font-weight:800; color:#fff; letter-spacing:-0.5px; margin:0 0 10px; }
  .wordmark span{ color:var(--gold); }

  .tagline{ font-size:15px; font-weight:600; color:#E7E7F2; margin:0 0 10px; }
  .sub{ font-size:13px; line-height:1.6; color:var(--text-dim); margin:0 0 30px; padding:0 6px; }

  .dots{ display:flex; gap:6px; justify-content:center; margin-bottom:26px; }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--navy-line); }
  .dot.active{ width:20px; border-radius:4px; background:var(--gold); }

  .btn-primary{ width:100%; padding:16px; border-radius:16px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border:none; color:var(--navy); font-size:15.5px; font-weight:800; box-shadow:0 14px 30px rgba(212,160,23,0.3); margin-bottom:12px; font-family:'Inter',sans-serif; }

  .continue-note{ font-size:11px; color:var(--text-faint); }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>

  <div class="collage">
    <div class="tile"><div class="tile-glow"></div></div>
    <div class="tile"><div class="tile-glow"></div><div class="tile-play"><svg viewBox="0 0 24 24" width="10" height="10" fill="#fff" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg></div></div>
    <div class="tile"><div class="tile-glow"></div></div>
    <div class="tile"><div class="tile-glow"></div></div>
    <div class="tile"><div class="tile-glow"></div><div class="tile-play"><svg viewBox="0 0 24 24" width="10" height="10" fill="#fff" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg></div></div>
    <div class="tile"><div class="tile-glow"></div></div>
  </div>
  <div class="veil"></div>

  <div class="skip">Skip</div>

  <div class="content">
    <div class="mark">W</div>
    <p class="wordmark">Wiam<span>Episio</span></p>
    <p class="tagline">African Vertical Drama</p>
    <p class="sub">Bold stories, short episodes. New series every week — made in Africa, built for your phone.</p>

    <div class="dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <button class="btn-primary">Continue</button>
    <p class="continue-note">Takes less than 30 seconds</p>
  </div>
</div>

</body>
</html>
