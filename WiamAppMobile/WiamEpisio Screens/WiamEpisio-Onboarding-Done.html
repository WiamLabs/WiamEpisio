<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — All Set</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }

  .glow-bg{ position:absolute; top:60px; left:50%; transform:translateX(-50%); width:420px; height:420px; background:radial-gradient(circle, rgba(212,160,23,0.20), transparent 65%); }

  .wrap{ position:relative; z-index:2; height:calc(100% - 44px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 32px 60px; text-align:center; }

  .badge-ring{ position:relative; width:132px; height:132px; margin-bottom:28px; }
  .ring{ position:absolute; inset:0; border-radius:50%; border:2px dashed rgba(212,160,23,0.35); }
  .ring2{ position:absolute; inset:14px; border-radius:50%; background:linear-gradient(160deg,var(--navy-card),var(--navy-soft)); border:1px solid var(--navy-line); display:flex; align-items:center; justify-content:center; }
  .check-mark{ width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 26px rgba(212,160,23,0.4); }

  .spark{ position:absolute; border-radius:50%; background:var(--gold); }
  .s1{ width:8px; height:8px; top:4px; right:10px; opacity:0.8; }
  .s2{ width:5px; height:5px; bottom:14px; left:0; opacity:0.6; }
  .s3{ width:6px; height:6px; top:40px; right:-6px; opacity:0.7; }

  h1{ font-size:24px; font-weight:800; color:#fff; margin:0 0 10px; letter-spacing:-0.3px; }
  .sub{ font-size:13.5px; color:var(--text-dim); line-height:1.6; margin:0 0 28px; max-width:280px; }
  .sub b{ color:#fff; font-weight:700; }

  .coin-card{ width:100%; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:18px; padding:16px 18px; display:flex; align-items:center; gap:14px; margin-bottom:32px; }
  .coin-icon{ width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:800; color:var(--navy); font-size:18px; }
  .coin-text{ text-align:left; }
  .coin-title{ font-size:14.5px; font-weight:800; color:#fff; margin:0; }
  .coin-sub{ font-size:11.5px; color:var(--text-dim); margin:2px 0 0; }
  .coin-amount{ margin-left:auto; font-size:16px; font-weight:800; color:var(--gold); white-space:nowrap; }

  .btn-primary{ width:100%; padding:16px; border-radius:16px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border:none; color:var(--navy); font-size:15.5px; font-weight:800; box-shadow:0 14px 30px rgba(212,160,23,0.3); margin-bottom:14px; font-family:'Inter',sans-serif; }

  .ghost-link{ font-size:12.5px; color:var(--text-dim); font-weight:600; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="glow-bg"></div>

  <div class="wrap">
    <div class="badge-ring">
      <div class="ring"></div>
      <div class="ring2">
        <div class="check-mark"><svg viewBox="0 0 24 24" width="24" height="24" stroke="#08081A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      </div>
      <span class="spark s1"></span>
      <span class="spark s2"></span>
      <span class="spark s3"></span>
    </div>

    <h1>You're all set!</h1>
    <p class="sub">Your feed is personalized around <b>Drama, Romance &amp; Royal</b>. New episodes drop every week.</p>

    <div class="coin-card">
      <div class="coin-icon">W</div>
      <div class="coin-text">
        <p class="coin-title">Welcome bonus</p>
        <p class="coin-sub">Added to your wallet</p>
      </div>
      <div class="coin-amount">+50 coins</div>
    </div>

    <button class="btn-primary">Start Watching</button>
    <span class="ghost-link">Maybe later</span>
  </div>
</div>

</body>
</html>
