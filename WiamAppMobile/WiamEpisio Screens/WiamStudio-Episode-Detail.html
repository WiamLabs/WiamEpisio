<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamStudio — Episode Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; --green:#3BB273; --red:#E4573D;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; }
  .statusbar{ height:44px; flex-shrink:0; }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .topbar{ display:flex; align-items:center; gap:12px; padding:2px 20px 14px; flex-shrink:0; }
  .icon-btn{ width:34px; height:34px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .topbar h1{ font-size:16px; font-weight:800; color:#fff; margin:0; flex:1; }
  .delete-btn{ color:var(--red); }

  .scroll{ flex:1; overflow-y:auto; padding:0 20px 20px; display:flex; gap:16px; }
  .left{ width:104px; flex-shrink:0; }
  .right{ flex:1; min-width:0; }

  .thumb-preview{ width:104px; height:150px; border-radius:14px; background:linear-gradient(160deg,#241a3a,#0d0d24); position:relative; overflow:hidden; border:1px solid var(--navy-line); margin-bottom:10px; display:flex; align-items:center; justify-content:center; }
  .thumb-preview svg{ color:rgba(255,255,255,0.5); width:22px; height:22px; }
  .status-pill{ display:flex; align-items:center; gap:5px; justify-content:center; font-size:9.5px; font-weight:800; padding:5px; border-radius:8px; background:rgba(59,178,115,0.16); color:var(--green); margin-bottom:10px; }
  .replace-btn{ width:100%; padding:9px; border-radius:10px; background:var(--navy-card); border:1px solid var(--navy-line); color:#C9C9DE; font-size:10.5px; font-weight:700; font-family:'Inter',sans-serif; }

  .field-group{ margin-bottom:14px; }
  .field-label{ font-size:11px; font-weight:700; color:#fff; margin:0 0 7px; }
  .field-box{ background:var(--navy-card); border:1px solid var(--navy-line); border-radius:13px; padding:11px 13px; }
  .field-box input, .field-box textarea{ background:none; border:none; outline:none; color:#fff; font-size:12.5px; font-family:inherit; width:100%; resize:none; }
  .field-box input::placeholder, .field-box textarea::placeholder{ color:var(--text-faint); }

  .meta-grid{ display:flex; gap:10px; margin-bottom:14px; }
  .meta-cell{ flex:1; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:12px; padding:9px 11px; }
  .meta-cell span{ display:block; font-size:9px; color:var(--text-faint); font-weight:700; text-transform:uppercase; margin-bottom:3px; }
  .meta-cell b{ font-size:11.5px; color:#fff; font-weight:700; }

  .toggle-row{ display:flex; align-items:center; justify-content:space-between; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:13px; padding:11px 13px; margin-bottom:14px; }
  .toggle-row span{ font-size:12px; color:#E7E7F2; font-weight:500; }
  .toggle{ width:38px; height:22px; border-radius:99px; background:var(--gold); position:relative; }
  .toggle-knob{ position:absolute; top:2px; right:2px; width:18px; height:18px; border-radius:50%; background:#fff; }

  .footer{ flex-shrink:0; padding:12px 20px 26px; }
  .btn-primary{ width:100%; padding:16px; border-radius:16px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border:none; color:var(--navy); font-size:15px; font-weight:800; box-shadow:0 14px 30px rgba(212,160,23,0.3); font-family:'Inter',sans-serif; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="topbar">
    <div class="icon-btn"><svg viewBox="0 0 24 24" width="15" height="15" color="#fff"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
    <h1>Episode 3</h1>
    <svg class="delete-btn" viewBox="0 0 24 24" width="17" height="17"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
  </div>

  <div class="scroll">
    <div class="left">
      <div class="thumb-preview"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg></div>
      <div class="status-pill"><svg viewBox="0 0 24 24" width="10" height="10"><polyline points="20 6 9 17 4 12"/></svg>READY</div>
      <button class="replace-btn">Replace Video</button>
    </div>

    <div class="right">
      <div class="field-group">
        <p class="field-label">Episode title</p>
        <div class="field-box"><input value="The Accusation" /></div>
      </div>

      <div class="field-group">
        <p class="field-label">Description</p>
        <div class="field-box"><textarea rows="4">Kwame is confronted by the palace elders — someone has told them everything, and now he must prove his claim or lose it forever.</textarea></div>
      </div>

      <div class="meta-grid">
        <div class="meta-cell"><span>Duration</span><b>5:02</b></div>
        <div class="meta-cell"><span>Resolution</span><b>1080×1920</b></div>
        <div class="meta-cell"><span>Size</span><b>241 MB</b></div>
      </div>

      <div class="toggle-row">
        <span>Free preview episode</span>
        <div class="toggle"><div class="toggle-knob"></div></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary">Save Changes</button>
  </div>
</div>

</body>
</html>
