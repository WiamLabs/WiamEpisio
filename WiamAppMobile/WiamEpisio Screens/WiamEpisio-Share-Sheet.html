<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamEpisio — Share</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .backdrop{ position:absolute; inset:0; background:linear-gradient(160deg,#1a1030,#0d0d24,#000); filter:brightness(0.3); }

  .sheet{ position:absolute; left:0; right:0; bottom:0; background:var(--navy-soft); border-radius:26px 26px 0 0; padding:14px 24px 34px; box-shadow:0 -20px 50px rgba(0,0,0,0.5); }
  .sheet-handle{ width:36px; height:4px; background:var(--navy-line); border-radius:99px; margin:0 auto 20px; }

  .share-preview{ display:flex; gap:13px; align-items:center; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:14px; padding:12px; margin-bottom:22px; }
  .share-poster{ width:44px; height:63px; border-radius:8px; background:linear-gradient(160deg,#241a3a,#0d0d24); flex-shrink:0; }
  .share-title{ font-size:12.5px; font-weight:700; color:#fff; margin:0 0 3px; }
  .share-sub{ font-size:10.5px; color:var(--text-dim); margin:0; }

  .apps-row{ display:flex; justify-content:space-between; margin-bottom:24px; }
  .app-item{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .app-icon{ width:52px; height:52px; border-radius:16px; display:flex; align-items:center; justify-content:center; }
  .app-icon.wa{ background:#25D366; }
  .app-icon.tw{ background:#000; border:1px solid var(--navy-line); }
  .app-icon.fb{ background:#1877F2; }
  .app-icon.tg{ background:#26A5E4; }
  .app-icon.more{ background:var(--navy-card); border:1px solid var(--navy-line); }
  .app-item span{ font-size:10px; color:#C9C9DE; font-weight:600; }

  .link-row{ display:flex; align-items:center; gap:10px; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:14px; padding:12px 14px; margin-bottom:16px; }
  .link-row input{ flex:1; background:none; border:none; outline:none; color:#B8B8CC; font-size:11.5px; font-family:monospace; }
  .copy-btn{ padding:8px 16px; border-radius:10px; background:var(--gold); color:var(--navy); font-size:11.5px; font-weight:800; border:none; font-family:'Inter',sans-serif; flex-shrink:0; }

  .action-list{ background:var(--navy-card); border:1px solid var(--navy-line); border-radius:14px; overflow:hidden; }
  .action-row{ display:flex; align-items:center; gap:12px; padding:13px 14px; border-bottom:1px solid var(--navy-line); }
  .action-row:last-child{ border-bottom:none; }
  .action-row svg{ width:17px; height:17px; color:var(--text-dim); }
  .action-row span{ font-size:13px; color:#E7E7F2; font-weight:500; }
</style>
</head>
<body>

<div class="phone">
  <div class="backdrop"></div>

  <div class="sheet">
    <div class="sheet-handle"></div>

    <div class="share-preview">
      <div class="share-poster"></div>
      <div>
        <p class="share-title">The Chief's Daughter</p>
        <p class="share-sub">wiamepisio.com/s/chiefs-daughter</p>
      </div>
    </div>

    <div class="apps-row">
      <div class="app-item"><div class="app-icon wa"><svg viewBox="0 0 24 24" width="24" height="24" fill="#fff" stroke="none"><path d="M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.2-1.3c1.5.8 3.1 1.3 4.8 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg></div><span>WhatsApp</span></div>
      <div class="app-item"><div class="app-icon tw"><svg viewBox="0 0 24 24" width="20" height="20" fill="#fff" stroke="none"><path d="M22 4s-.7 2.1-2 3.4c1.6 9.4-8.4 16.2-16.5 11.1 2.4.1 4.8-.6 6.6-2C6.4 16 4.2 13.7 3.5 11c1 .1 1.9 0 2.7-.3C3.4 9.9 1.7 7.5 1.7 4.9c.8.4 1.7.7 2.7.8C2.6 4.1 2 1.5 3.3.3c2.4 2.9 5.9 4.8 9.9 5-1-4 3.6-7 6.7-4.4 1.1 0 2.1-.4 3-1-.4 1.2-1.2 2.1-2.2 2.7 1-.1 1.9-.4 2.8-.8-.6 1-1.5 1.9-2.5 2.6z"/></svg></div><span>X</span></div>
      <div class="app-item"><div class="app-icon fb"><svg viewBox="0 0 24 24" width="20" height="20" fill="#fff" stroke="none"><path d="M22 12c0-5.5-4.5-10-10-10S2 6.5 2 12c0 5 3.7 9.1 8.4 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7C18.3 21.1 22 17 22 12z"/></svg></div><span>Facebook</span></div>
      <div class="app-item"><div class="app-icon tg"><svg viewBox="0 0 24 24" width="21" height="21" fill="#fff" stroke="none"><path d="M22 3L2 11l6 2 2 7 3-4 5 4z"/></svg></div><span>Telegram</span></div>
      <div class="app-item"><div class="app-icon more"><svg viewBox="0 0 24 24" width="18" height="18" color="#C9C9DE"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></div><span>More</span></div>
    </div>

    <div class="link-row">
      <input readonly value="wiamepisio.com/s/chiefs-daughter" />
      <button class="copy-btn">Copy</button>
    </div>

    <div class="action-list">
      <div class="action-row"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Add to Home Screen</span></div>
      <div class="action-row"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>Share Poster Image</span></div>
    </div>
  </div>
</div>

</body>
</html>
