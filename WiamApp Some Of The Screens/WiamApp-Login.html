<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamApp — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#08081A; --navy-card:#12122A; --navy-line:#1E1E42; --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; padding:0 26px; }
  .statusbar{ height:44px; }
  .top{ margin-top:24px; margin-bottom:34px; }
  .logo-mark{ width:48px; height:48px; border-radius:14px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:800; font-size:20px; margin-bottom:20px; }
  h1{ font-size:23px; font-weight:700; color:#fff; margin:0 0 6px; }
  .sub{ font-size:13px; color:var(--text-dim); margin:0; }

  .field-group{ margin-bottom:16px; }
  .field-label{ font-size:12px; font-weight:600; color:#B8B8CC; margin:0 0 8px; display:block; }
  .field-box{ background:var(--navy-card); border:1px solid var(--navy-line); border-radius:14px; padding:13px 14px; display:flex; align-items:center; gap:10px; }
  .field-box svg{ color:var(--gold); flex-shrink:0; width:16px; height:16px; }
  .field-box input{ background:none; border:none; outline:none; color:#fff; font-size:13.5px; font-family:inherit; width:100%; }
  .field-box input::placeholder{ color:var(--text-faint); }
  .eye-btn{ background:none; border:none; color:var(--text-faint); cursor:pointer; display:flex; }

  .forgot-row{ text-align:right; margin-bottom:26px; }
  .forgot-row span{ font-size:12px; color:var(--gold); font-weight:500; cursor:pointer; }

  .login-btn{ padding:15px; border-radius:16px; background:var(--gold); color:var(--navy); font-size:14.5px; font-weight:700; border:none; cursor:pointer; }

  .divider{ display:flex; align-items:center; gap:12px; margin:26px 0; }
  .divider .line{ flex:1; height:1px; background:var(--navy-line); }
  .divider span{ font-size:11.5px; color:var(--text-faint); }

  .signup-row{ text-align:center; font-size:12.5px; color:var(--text-dim); margin-top:auto; padding-bottom:30px; }
  .signup-row span{ color:var(--gold); font-weight:600; }

  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"></div>
  <div class="top">
    <div class="logo-mark">W</div>
    <h1>Welcome back</h1>
    <p class="sub">Log in to continue to WiamApp</p>
  </div>

  <div class="field-group">
    <label class="field-label">Email address</label>
    <div class="field-box">
      <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><polyline points="22 6 12 13 2 6"/></svg>
      <input type="email" placeholder="you@example.com" />
    </div>
  </div>

  <div class="field-group">
    <label class="field-label">Password</label>
    <div class="field-box">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" placeholder="••••••••" />
      <button class="eye-btn"><svg viewBox="0 0 24 24" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
  </div>

  <div class="forgot-row"><span>Forgot password?</span></div>

  <button class="login-btn">Log In</button>

  <div class="divider"><div class="line"></div><span>or</span><div class="line"></div></div>

  <p class="signup-row">Don't have an account? <span>Sign up</span></p>
</div>
</body>
</html>
