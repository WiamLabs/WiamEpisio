<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamApp — Saved Addresses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }
  .header{ display:flex; align-items:center; justify-content:space-between; padding:0 20px 14px; }
  .header-left{ display:flex; align-items:center; gap:12px; }
  .back-btn{ width:36px; height:36px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .header h1{ font-size:17px; font-weight:700; color:#fff; margin:0; }
  .add-btn{ width:36px; height:36px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; }

  .scrollarea{ height:calc(100% - 44px - 58px); overflow-y:auto; padding:0 20px 20px; }

  .addr-card{ display:flex; gap:13px; padding:15px; border-radius:18px; background:var(--navy-card); border:1px solid var(--navy-line); margin-bottom:10px; }
  .addr-icon{ width:40px; height:40px; border-radius:12px; background:rgba(212,160,23,0.1); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .addr-icon svg{ color:var(--gold); width:18px; height:18px; }
  .addr-info{ flex:1; min-width:0; }
  .addr-label-row{ display:flex; align-items:center; gap:7px; }
  .addr-label{ font-size:13.5px; font-weight:700; color:#fff; margin:0; }
  .default-pill{ font-size:9.5px; font-weight:700; color:var(--gold); background:rgba(212,160,23,0.14); padding:2px 8px; border-radius:999px; }
  .addr-line{ font-size:12px; color:var(--text-dim); margin:4px 0 0; line-height:1.4; }
  .addr-gps{ font-size:10.5px; color:var(--text-faint); margin:4px 0 0; font-family:monospace; }
  .addr-actions{ display:flex; flex-direction:column; gap:8px; }
  .addr-actions svg{ width:15px; height:15px; color:var(--text-faint); }

  .add-address{
    display:flex; align-items:center; gap:10px; padding:15px; border-radius:18px;
    border:1.5px dashed var(--navy-line); color:var(--text-dim); font-size:13px; font-weight:500;
  }
  .add-address svg{ color:var(--gold); width:18px; height:18px; }

  .footer-copy{ text-align:center; font-size:10px; color:#3A3A56; padding:18px 0 6px; }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="header">
    <div class="header-left">
      <div class="back-btn"><svg viewBox="0 0 24 24" width="17" height="17" color="#fff"><polyline points="15 18 9 12 15 6"/></svg></div>
      <h1>Saved Addresses</h1>
    </div>
    <div class="add-btn"><svg viewBox="0 0 24 24" width="17" height="17" color="#08081A"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
  </div>

  <div class="scrollarea">
    <div class="addr-card">
      <div class="addr-icon"><svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 0 0 1 1h3m10-11l2 2m-2-2v10a1 1 0 0 1-1 1h-3m-6 0a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1m-6 0h6"/></svg></div>
      <div class="addr-info">
        <div class="addr-label-row"><p class="addr-label">Home</p><span class="default-pill">Default</span></div>
        <p class="addr-line">Emefs Lagoon View Estate, Community 18, Lashibi</p>
        <p class="addr-gps">GQ-285-1104 · Greater Accra</p>
      </div>
      <div class="addr-actions">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
      </div>
    </div>

    <div class="addr-card">
      <div class="addr-icon"><svg viewBox="0 0 24 24"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 9h1"/><path d="M14 9h1"/><path d="M9 13h1"/><path d="M14 13h1"/></svg></div>
      <div class="addr-info">
        <div class="addr-label-row"><p class="addr-label">Work</p></div>
        <p class="addr-line">Frimps Avenue, Sakumono, Tema West</p>
        <p class="addr-gps">GT-285-0904 · Greater Accra</p>
      </div>
      <div class="addr-actions">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
      </div>
    </div>

    <div class="add-address">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add a new address
    </div>

    <p class="footer-copy">© 2026 WiamApp · Powered by WiamLabs</p>
  </div>
</div>

</body>
</html>
