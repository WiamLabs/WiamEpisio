<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamApp — Payment Methods</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }
  .header{ display:flex; align-items:center; gap:12px; padding:0 20px 14px; }
  .back-btn{ width:36px; height:36px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .header h1{ font-size:17px; font-weight:700; color:#fff; margin:0; }

  .scrollarea{ height:calc(100% - 44px - 58px - 96px); overflow-y:auto; padding:0 20px; }

  .card-visual{
    border-radius:20px; padding:20px; margin-bottom:12px; position:relative; overflow:hidden;
    background:linear-gradient(135deg,#1a1a3e,#0d0d24); border:1px solid var(--navy-line); height:150px;
  }
  .card-visual.default{ border-color:var(--gold); }
  .card-glow{ position:absolute; right:-30px; top:-30px; width:130px; height:130px; border-radius:50%; background:var(--gold); opacity:0.08; }
  .card-top-row{ display:flex; justify-content:space-between; align-items:flex-start; }
  .card-type{ font-size:11px; color:var(--text-faint); font-weight:600; letter-spacing:0.5px; }
  .default-pill{ font-size:9.5px; font-weight:700; color:var(--gold); background:rgba(212,160,23,0.14); padding:3px 9px; border-radius:999px; }
  .card-chip{ width:36px; height:26px; border-radius:6px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); margin:18px 0 14px; }
  .card-number{ font-size:16px; color:#fff; letter-spacing:2px; font-weight:600; margin:0 0 12px; }
  .card-bottom-row{ display:flex; justify-content:space-between; align-items:flex-end; }
  .card-holder{ font-size:11px; color:#B8B8CC; text-transform:uppercase; letter-spacing:0.5px; }
  .card-brand{ font-size:13px; font-weight:800; color:#fff; }

  .momo-card{ display:flex; align-items:center; gap:13px; padding:15px; border-radius:18px; background:var(--navy-card); border:1px solid var(--navy-line); margin-bottom:10px; }
  .momo-icon{ width:42px; height:42px; border-radius:12px; background:rgba(255,204,0,0.12); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:800; color:#FFCC00; font-size:11px; }
  .momo-name{ font-size:13.5px; font-weight:600; color:#fff; margin:0; }
  .momo-sub{ font-size:11.5px; color:var(--text-faint); margin:2px 0 0; }

  .add-method{
    display:flex; align-items:center; gap:10px; padding:15px; border-radius:18px;
    border:1.5px dashed var(--navy-line); color:var(--text-dim); font-size:13px; font-weight:500;
  }
  .add-method svg{ color:var(--gold); width:18px; height:18px; }

  .security-note{ display:flex; gap:9px; margin-top:16px; padding:12px 13px; border-radius:14px; background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.2); }
  .security-note svg{ color:#22C55E; flex-shrink:0; width:15px; height:15px; }
  .security-note p{ font-size:11px; color:#8FD6A8; line-height:1.5; margin:0; }

  .footer-copy{ text-align:center; font-size:10px; color:#3A3A56; padding:18px 0 6px; }
  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="header">
    <div class="back-btn"><svg viewBox="0 0 24 24" width="17" height="17" color="#fff"><polyline points="15 18 9 12 15 6"/></svg></div>
    <h1>Payment Methods</h1>
  </div>

  <div class="scrollarea">
    <div class="card-visual default">
      <div class="card-glow"></div>
      <div class="card-top-row">
        <span class="card-type">DEBIT CARD</span>
        <span class="default-pill">Default</span>
      </div>
      <div class="card-chip"></div>
      <p class="card-number">•••• •••• •••• 4694</p>
      <div class="card-bottom-row">
        <span class="card-holder">Martin Wiafe</span>
        <span class="card-brand">VISA</span>
      </div>
    </div>

    <div class="momo-card">
      <div class="momo-icon">MTN</div>
      <div>
        <p class="momo-name">MTN Mobile Money</p>
        <p class="momo-sub">•••• •• 5436</p>
      </div>
    </div>

    <div class="add-method">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add payment method
    </div>

    <div class="security-note">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
      <p>Your card details are securely stored by Paystack. WiamApp never sees or stores your full card number.</p>
    </div>

    <p class="footer-copy">© 2026 WiamApp · Powered by WiamLabs</p>
  </div>
</div>

</body>
</html>
