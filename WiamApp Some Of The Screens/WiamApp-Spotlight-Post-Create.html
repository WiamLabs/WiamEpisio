<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamApp — New Spotlight Post</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }
  .header{ display:flex; align-items:center; gap:12px; padding:0 20px 14px; }
  .back-btn{ width:36px; height:36px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .header h1{ font-size:17px; font-weight:700; color:#fff; margin:0; }

  .scrollarea{ height:calc(100% - 44px - 58px - 96px); overflow-y:auto; padding:0 20px; }

  .photo-upload{
    aspect-ratio:16/10; border-radius:20px; border:1.5px dashed var(--navy-line);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; margin-bottom:20px;
    background:var(--navy-card);
  }
  .photo-upload svg{ color:var(--gold); width:26px; height:26px; }
  .photo-upload span{ font-size:12.5px; color:var(--text-dim); font-weight:500; }
  .photo-upload small{ font-size:10.5px; color:var(--text-faint); }

  .field-group{ margin-bottom:18px; }
  .field-label{ font-size:12.5px; font-weight:600; color:#fff; margin:0 0 8px; display:block; }
  .field-box{ background:var(--navy-card); border:1px solid var(--navy-line); border-radius:14px; padding:12px 14px; }
  .field-box textarea{ background:none; border:none; outline:none; color:#fff; font-size:13px; font-family:inherit; width:100%; resize:none; }
  .field-box textarea::placeholder{ color:var(--text-faint); }
  .char-count{ font-size:10.5px; color:var(--text-faint); text-align:right; margin-top:4px; }

  .tag-select{ display:flex; align-items:center; gap:10px; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:14px; padding:12px 14px; }
  .tag-select svg{ color:var(--gold); width:16px; height:16px; flex-shrink:0; }
  .tag-select-text{ font-size:13px; color:#fff; flex:1; }
  .tag-chevron{ color:var(--text-faint); }

  .visibility-row{ display:flex; align-items:center; justify-content:space-between; background:var(--navy-card); border:1px solid var(--navy-line); border-radius:14px; padding:13px 14px; margin-top:4px; }
  .visibility-text{ font-size:13px; color:#fff; font-weight:500; }
  .visibility-sub{ font-size:11px; color:var(--text-faint); margin-top:2px; }
  .switch{ width:44px; height:26px; border-radius:999px; background:var(--gold); display:flex; align-items:center; padding:3px; flex-shrink:0; }
  .switch-dot{ width:20px; height:20px; border-radius:50%; background:var(--navy); margin-left:18px; }

  .footer-copy{ text-align:center; font-size:10px; color:#3A3A56; padding:16px 0 6px; }

  .postbar{ position:absolute; bottom:0; left:0; right:0; height:96px; background:var(--navy-soft); border-top:1px solid #1C1C38; display:flex; align-items:center; padding:0 20px; }
  .post-btn{ width:100%; padding:14px; border-radius:16px; background:var(--gold); color:var(--navy); font-size:14px; font-weight:700; border:none; cursor:pointer; }

  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="header">
    <div class="back-btn"><svg viewBox="0 0 24 24" width="17" height="17" color="#fff"><polyline points="15 18 9 12 15 6"/></svg></div>
    <h1>New Spotlight Post</h1>
  </div>

  <div class="scrollarea">
    <div class="photo-upload">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <span>Add a photo of your work</span>
      <small>This is what customers see first</small>
    </div>

    <div class="field-group">
      <label class="field-label">Caption</label>
      <div class="field-box">
        <textarea rows="3" placeholder="e.g. Full house rewiring completed in 2 days — safe, clean, and to code."></textarea>
      </div>
      <p class="char-count">0/150</p>
    </div>

    <div class="field-group">
      <label class="field-label">Tag a category</label>
      <div class="tag-select">
        <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span class="tag-select-text">Electrical & Power</span>
        <svg class="tag-chevron" viewBox="0 0 24 24" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Visibility</label>
      <div class="visibility-row">
        <div>
          <p class="visibility-text">Show on Spotlight feed</p>
          <p class="visibility-sub">Visible to customers browsing your category</p>
        </div>
        <div class="switch"><div class="switch-dot"></div></div>
      </div>
    </div>

    <p class="footer-copy">© 2026 WiamApp · Powered by WiamLabs</p>
  </div>

  <div class="postbar">
    <button class="post-btn">Post to Spotlight</button>
  </div>
</div>

</body>
</html>
