<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamApp — Edit Worker Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }
  .header{ display:flex; align-items:center; gap:12px; padding:0 20px 14px; }
  .back-btn{ width:36px; height:36px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .header h1{ font-size:17px; font-weight:700; color:#fff; margin:0; }

  .scrollarea{ height:calc(100% - 44px - 58px - 96px); overflow-y:auto; padding:0 20px; }

  .avatar-edit{ display:flex; flex-direction:column; align-items:center; margin-bottom:22px; }
  .avatar-wrap{ position:relative; width:84px; height:84px; }
  .avatar-big{ width:84px; height:84px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:800; font-size:32px; border:3px solid var(--navy-line); }
  .cam-badge{ position:absolute; bottom:0; right:0; width:28px; height:28px; border-radius:50%; background:var(--gold); border:3px solid var(--navy); display:flex; align-items:center; justify-content:center; }
  .change-photo{ font-size:12px; color:var(--gold); font-weight:600; margin-top:10px; }

  .field-group{ margin-bottom:16px; }
  .field-label{ font-size:12px; font-weight:600; color:#B8B8CC; margin:0 0 8px; display:block; }
  .field-box{ background:var(--navy-card); border:1px solid var(--navy-line); border-radius:14px; padding:12px 14px; display:flex; align-items:center; gap:10px; }
  .field-box svg{ color:var(--gold); flex-shrink:0; width:15px; height:15px; }
  .field-box input, .field-box textarea{ background:none; border:none; outline:none; color:#fff; font-size:13px; font-family:inherit; width:100%; resize:none; }
  .field-box input::placeholder, .field-box textarea::placeholder{ color:var(--text-faint); }
  .char-count{ font-size:10.5px; color:var(--text-faint); text-align:right; margin-top:4px; }

  .row-2{ display:flex; gap:10px; }
  .row-2 .field-group{ flex:1; }

  .skill-grid{ display:flex; flex-wrap:wrap; gap:8px; }
  .skill-tag{ display:flex; align-items:center; gap:6px; padding:8px 13px; border-radius:999px; background:var(--navy-card); border:1.5px solid var(--gold); font-size:12px; color:var(--gold); font-weight:600; }
  .skill-tag svg{ width:12px; height:12px; }

  .footer-copy{ text-align:center; font-size:10px; color:#3A3A56; padding:16px 0 6px; }

  .savebar{ position:absolute; bottom:0; left:0; right:0; height:96px; background:var(--navy-soft); border-top:1px solid #1C1C38; display:flex; align-items:center; padding:0 20px; }
  .save-btn{ width:100%; padding:14px; border-radius:16px; background:var(--gold); color:var(--navy); font-size:14px; font-weight:700; border:none; cursor:pointer; }

  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="header">
    <div class="back-btn"><svg viewBox="0 0 24 24" width="17" height="17" color="#fff"><polyline points="15 18 9 12 15 6"/></svg></div>
    <h1>Edit Profile</h1>
  </div>

  <div class="scrollarea">
    <div class="avatar-edit">
      <div class="avatar-wrap">
        <div class="avatar-big">K</div>
        <div class="cam-badge"><svg viewBox="0 0 24 24" width="13" height="13" stroke="#08081A" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
      </div>
      <span class="change-photo">Change photo</span>
    </div>

    <div class="field-group">
      <label class="field-label">Full name</label>
      <div class="field-box"><input value="Khoby Wise" /></div>
    </div>

    <div class="field-group">
      <label class="field-label">About / Bio</label>
      <div class="field-box">
        <textarea rows="4">Licensed electrician with 6 years of experience in residential and commercial wiring. Specialized in full house rewiring, solar installation, and smart home setups.</textarea>
      </div>
      <p class="char-count">168/300</p>
    </div>

    <div class="row-2">
      <div class="field-group">
        <label class="field-label">Starting rate (GHS)</label>
        <div class="field-box">
          <svg viewBox="0 0 24 24"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
          <input value="150" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Years experience</label>
        <div class="field-box">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <input value="6" />
        </div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Skills</label>
      <div class="skill-grid">
        <span class="skill-tag"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>House Wiring</span>
        <span class="skill-tag"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Solar Panels</span>
        <span class="skill-tag"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Inverter Setup</span>
      </div>
    </div>

    <p class="footer-copy">© 2026 WiamApp · Powered by WiamLabs</p>
  </div>

  <div class="savebar">
    <button class="save-btn">Save Profile</button>
  </div>
</div>

</body>
</html>
