<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamApp — Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75; --error:#EF4444;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }
  .header{ display:flex; align-items:center; gap:12px; padding:0 20px 14px; }
  .back-btn{ width:36px; height:36px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .header h1{ font-size:17px; font-weight:700; color:#fff; margin:0; }

  .scrollarea{ height:calc(100% - 44px - 58px); overflow-y:auto; padding:0 20px 20px; }

  .section-label{ font-size:11px; font-weight:700; letter-spacing:0.8px; color:var(--text-faint); text-transform:uppercase; margin:20px 4px 10px; }
  .section-label:first-child{ margin-top:0; }

  .menu-group{ border-radius:20px; background:var(--navy-card); border:1px solid var(--navy-line); overflow:hidden; }
  .menu-row{ display:flex; align-items:center; gap:13px; padding:14px 16px; border-bottom:1px solid var(--navy-line); }
  .menu-row:last-child{ border-bottom:none; }
  .menu-icon{ width:36px; height:36px; border-radius:11px; background:rgba(212,160,23,0.1); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .menu-icon svg{ width:17px; height:17px; color:var(--gold); }
  .menu-text{ flex:1; }
  .menu-title{ font-size:13.5px; font-weight:500; color:#fff; margin:0; }
  .menu-sub{ font-size:11px; color:var(--text-faint); margin:2px 0 0; }
  .menu-chevron{ color:var(--text-faint); flex-shrink:0; }

  .switch{ width:44px; height:26px; border-radius:999px; background:var(--gold); display:flex; align-items:center; padding:3px; flex-shrink:0; }
  .switch-dot{ width:20px; height:20px; border-radius:50%; background:var(--navy); margin-left:18px; }
  .switch.off{ background:var(--navy-line); }
  .switch.off .switch-dot{ margin-left:0; background:#8B8BA3; }

  .lang-value{ font-size:12px; color:var(--gold); font-weight:600; margin-right:4px; }

  .danger-text{ color:var(--error) !important; }

  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="header">
    <div class="back-btn"><svg viewBox="0 0 24 24" width="17" height="17" color="#fff"><polyline points="15 18 9 12 15 6"/></svg></div>
    <h1>Settings</h1>
  </div>

  <div class="scrollarea">
    <p class="section-label">Account</p>
    <div class="menu-group">
      <div class="menu-row">
        <div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div class="menu-text"><p class="menu-title">Edit Profile</p></div>
        <svg class="menu-chevron" viewBox="0 0 24 24" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="menu-row">
        <div class="menu-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <div class="menu-text"><p class="menu-title">Change Password</p></div>
        <svg class="menu-chevron" viewBox="0 0 24 24" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="menu-row">
        <div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
        <div class="menu-text"><p class="menu-title">Phone Number</p><p class="menu-sub">+233 55 000 0000</p></div>
        <svg class="menu-chevron" viewBox="0 0 24 24" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

    <p class="section-label">Notifications</p>
    <div class="menu-group">
      <div class="menu-row">
        <div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></div>
        <div class="menu-text"><p class="menu-title">Push Notifications</p></div>
        <div class="switch"><div class="switch-dot"></div></div>
      </div>
      <div class="menu-row">
        <div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><polyline points="22 6 12 13 2 6"/></svg></div>
        <div class="menu-text"><p class="menu-title">Email Updates</p></div>
        <div class="switch off"><div class="switch-dot"></div></div>
      </div>
      <div class="menu-row">
        <div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
        <div class="menu-text"><p class="menu-title">SMS Alerts</p></div>
        <div class="switch"><div class="switch-dot"></div></div>
      </div>
    </div>

    <p class="section-label">Preferences</p>
    <div class="menu-group">
      <div class="menu-row">
        <div class="menu-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>
        <div class="menu-text"><p class="menu-title">Language</p></div>
        <span class="lang-value">English</span>
        <svg class="menu-chevron" viewBox="0 0 24 24" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="menu-row">
        <div class="menu-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></div>
        <div class="menu-text"><p class="menu-title">Dark Mode</p></div>
        <div class="switch"><div class="switch-dot"></div></div>
      </div>
    </div>

    <p class="section-label">Support</p>
    <div class="menu-group">
      <div class="menu-row">
        <div class="menu-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <div class="menu-text"><p class="menu-title">Help Center</p></div>
        <svg class="menu-chevron" viewBox="0 0 24 24" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="menu-row">
        <div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div class="menu-text"><p class="menu-title">Terms & Privacy Policy</p></div>
        <svg class="menu-chevron" viewBox="0 0 24 24" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="menu-row">
        <div class="menu-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>
        <div class="menu-text"><p class="menu-title">About WiamApp</p><p class="menu-sub">Version 1.0.0</p></div>
        <svg class="menu-chevron" viewBox="0 0 24 24" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

    <p class="section-label">Danger Zone</p>
    <div class="menu-group">
      <div class="menu-row">
        <div class="menu-icon" style="background:rgba(239,68,68,0.1);"><svg viewBox="0 0 24 24" class="danger-text"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></div>
        <div class="menu-text"><p class="menu-title danger-text">Delete Account</p></div>
        <svg class="menu-chevron" viewBox="0 0 24 24" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
  </div>
</div>

</body>
</html>
