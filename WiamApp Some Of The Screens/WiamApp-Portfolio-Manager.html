<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamApp — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }
  .header{ display:flex; align-items:center; justify-content:space-between; padding:0 20px 14px; }
  .header-left{ display:flex; align-items:center; gap:12px; }
  .back-btn{ width:36px; height:36px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .header h1{ font-size:17px; font-weight:700; color:#fff; margin:0; }
  .add-btn{ width:36px; height:36px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; }

  .scrollarea{ height:calc(100% - 44px - 58px); overflow-y:auto; padding:0 20px 20px; }
  .hint{ font-size:12px; color:var(--text-dim); line-height:1.5; margin:0 0 18px; }

  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .item{
    aspect-ratio:1; border-radius:18px; background:linear-gradient(135deg,var(--navy-card),#0d0d24);
    border:1px solid var(--navy-line); display:flex; align-items:center; justify-content:center;
    color:#3E3E5C; font-size:10.5px; position:relative;
  }
  .item-remove{
    position:absolute; top:8px; right:8px; width:24px; height:24px; border-radius:50%;
    background:rgba(8,8,26,0.7); display:flex; align-items:center; justify-content:center;
  }
  .item-remove svg{ color:#fff; width:12px; height:12px; }
  .item-caption{
    position:absolute; bottom:0; left:0; right:0; padding:8px 10px;
    background:linear-gradient(transparent,rgba(0,0,0,0.6)); border-radius:0 0 18px 18px;
  }
  .item-caption span{ font-size:10px; color:#fff; font-weight:500; }

  .add-tile{
    aspect-ratio:1; border-radius:18px; border:1.5px dashed var(--navy-line);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  }
  .add-tile svg{ color:var(--gold); width:22px; height:22px; }
  .add-tile span{ font-size:11px; color:var(--text-dim); font-weight:500; }

  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="header">
    <div class="header-left">
      <div class="back-btn"><svg viewBox="0 0 24 24" width="17" height="17" color="#fff"><polyline points="15 18 9 12 15 6"/></svg></div>
      <h1>Portfolio</h1>
    </div>
    <div class="add-btn"><svg viewBox="0 0 24 24" width="17" height="17" color="#08081A"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
  </div>

  <div class="scrollarea">
    <p class="hint">Showcase your best work. Customers browsing the Spotlight feed see these photos first — quality here builds trust fast.</p>

    <div class="grid">
      <div class="item">
        <div class="item-remove"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
        <div class="item-caption"><span>House rewiring</span></div>
      </div>
      <div class="item">
        <div class="item-remove"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
        <div class="item-caption"><span>Solar install</span></div>
      </div>
      <div class="item">
        <div class="item-remove"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
        <div class="item-caption"><span>CCTV setup</span></div>
      </div>
      <div class="item">
        <div class="item-remove"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
        <div class="item-caption"><span>Inverter job</span></div>
      </div>
      <div class="item">
        <div class="item-remove"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
        <div class="item-caption"><span>Panel upgrade</span></div>
      </div>
      <div class="add-tile">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Add photo</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
