<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WiamApp — Leave a Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#08081A; --navy-card:#12122A; --navy-soft:#161634; --navy-line:#1E1E42;
    --gold:#D4A017; --gold-dark:#A07810; --text-dim:#7D7D97; --text-faint:#5A5A75;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 0; }
  .phone{ width:390px; height:844px; background:var(--navy); border-radius:46px; overflow:hidden; position:relative; border:6px solid #000; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
  .statusbar{ height:44px; }
  .header{ display:flex; align-items:center; gap:12px; padding:0 20px 14px; }
  .back-btn{ width:36px; height:36px; border-radius:50%; background:var(--navy-card); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .header h1{ font-size:17px; font-weight:700; color:#fff; margin:0; }

  .scrollarea{ height:calc(100% - 44px - 58px - 96px); overflow-y:auto; padding:0 20px; }

  .worker-hero{ text-align:center; padding:6px 0 22px; }
  .worker-avatar{ width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:800; font-size:24px; margin:0 auto 12px; }
  .worker-hero h2{ font-size:15px; font-weight:700; color:#fff; margin:0 0 4px; }
  .worker-hero p{ font-size:12px; color:var(--text-dim); margin:0; }

  .stars-row{ display:flex; justify-content:center; gap:8px; margin-bottom:22px; }
  .star{ width:38px; height:38px; }
  .star.filled{ color:var(--gold); }
  .star.empty{ color:var(--navy-line); }

  .field-group{ margin-bottom:16px; }
  .field-label{ font-size:12.5px; font-weight:600; color:#fff; margin:0 0 8px; display:block; }
  .field-box{ background:var(--navy-card); border:1px solid var(--navy-line); border-radius:14px; padding:13px 14px; }
  .field-box textarea{ background:none; border:none; outline:none; color:#fff; font-size:13px; font-family:inherit; width:100%; resize:none; }
  .field-box textarea::placeholder{ color:var(--text-faint); }

  .tag-row{ display:flex; flex-wrap:wrap; gap:8px; }
  .tag-chip{ padding:8px 13px; border-radius:999px; background:var(--navy-card); border:1px solid var(--navy-line); color:#B8B8CC; font-size:11.5px; }
  .tag-chip.selected{ background:rgba(212,160,23,0.1); border-color:var(--gold); color:var(--gold); font-weight:600; }

  .photo-add{ width:64px; height:64px; border-radius:14px; border:1.5px dashed var(--navy-line); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .photo-add svg{ color:var(--gold); width:18px; height:18px; }
  .photo-row{ display:flex; gap:10px; }

  .footer-copy{ text-align:center; font-size:10px; color:#3A3A56; padding:16px 0 6px; }

  .submitbar{ position:absolute; bottom:0; left:0; right:0; height:96px; background:var(--navy-soft); border-top:1px solid #1C1C38; display:flex; align-items:center; padding:0 20px; }
  .submit-btn{ width:100%; padding:14px; border-radius:16px; background:var(--gold); color:var(--navy); font-size:14px; font-weight:700; border:none; cursor:pointer; }

  svg{ stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar"></div>
  <div class="header">
    <div class="back-btn"><svg viewBox="0 0 24 24" width="17" height="17" color="#fff"><polyline points="15 18 9 12 15 6"/></svg></div>
    <h1>Rate Your Experience</h1>
  </div>

  <div class="scrollarea">
    <div class="worker-hero">
      <div class="worker-avatar">KO</div>
      <h2>How was Kwabena's work?</h2>
      <p>Electrical & Power · Completed today</p>
    </div>

    <div class="stars-row">
      <svg class="star filled" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15 9 22 9.5 16.5 14.3 18.2 21 12 17.3 5.8 21 7.5 14.3 2 9.5 9 9"/></svg>
      <svg class="star filled" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15 9 22 9.5 16.5 14.3 18.2 21 12 17.3 5.8 21 7.5 14.3 2 9.5 9 9"/></svg>
      <svg class="star filled" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15 9 22 9.5 16.5 14.3 18.2 21 12 17.3 5.8 21 7.5 14.3 2 9.5 9 9"/></svg>
      <svg class="star filled" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15 9 22 9.5 16.5 14.3 18.2 21 12 17.3 5.8 21 7.5 14.3 2 9.5 9 9"/></svg>
      <svg class="star empty" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15 9 22 9.5 16.5 14.3 18.2 21 12 17.3 5.8 21 7.5 14.3 2 9.5 9 9"/></svg>
    </div>

    <div class="field-group">
      <label class="field-label">What went well?</label>
      <div class="tag-row">
        <div class="tag-chip selected">On time</div>
        <div class="tag-chip selected">Clean work</div>
        <div class="tag-chip">Friendly</div>
        <div class="tag-chip">Good price</div>
        <div class="tag-chip">Explained clearly</div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Write a review (optional)</label>
      <div class="field-box">
        <textarea rows="4" placeholder="Share details about the work quality, punctuality, and professionalism..."></textarea>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Add a photo (optional)</label>
      <div class="photo-row">
        <div class="photo-add"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
      </div>
    </div>

    <p class="footer-copy">© 2026 WiamApp · Powered by WiamLabs</p>
  </div>

  <div class="submitbar">
    <button class="submit-btn">Submit Review</button>
  </div>
</div>

</body>
</html>
